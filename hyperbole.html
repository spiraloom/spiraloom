<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror, Mirror</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ background:#05060a; min-height:100%; }
  body{ background:transparent; min-height:100vh; overflow:hidden; font-family:"Cormorant Garamond",serif; }

  /* ---- return link, in the house style ---- */
  #return-house{
    position:fixed; top:1.2rem; left:1.4rem; z-index:40;
    font-family:"Cinzel",serif;
    font-size:.55rem; letter-spacing:.42em; text-transform:uppercase;
    color:rgba(224,196,150,.72); text-decoration:none; transition:color .4s ease;
  }
  #return-house:hover{ color:#e8d4a4; }

  /* ---- full-bleed background film ---- */
  #bg-video{
    position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover;
    z-index:-2; pointer-events:none;
  }
  #bg-tint{ /* the faintest settling of the palette, so text stays legible */
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(ellipse at 50% 42%, transparent 42%, rgba(5,6,10,.28) 84%, rgba(5,6,10,.55) 100%),
      linear-gradient(rgba(6,6,12,.12), rgba(5,6,10,.2));
  }

  /* ---- the invocation ---- */
  #invocation{
    position:fixed; top:8.5vh; left:0; right:0; z-index:10;
    text-align:center; pointer-events:none;
  }
  #invocation h1{
    font-family:"Cormorant Garamond",serif; font-weight:400; font-style:italic;
    font-size:clamp(2rem, 6vw, 4.2rem); letter-spacing:.14em; line-height:1.2;
    /* marcasite: cool polished silver with a bright sheen travelling through it */
    background:linear-gradient(105deg,
      #6d7885 0%, #b8c2cc 18%, #eef3f7 33%, #ffffff 42%,
      #cfd7de 52%, #9aa4b0 66%, #d6dde3 80%, #7f8a97 100%);
    background-size:280% 100%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.65))
           drop-shadow(0 0 12px rgba(190,210,230,.55))
           drop-shadow(0 0 34px rgba(150,180,215,.35));
    animation:sheen 7s ease-in-out infinite, breathe 6s ease-in-out infinite;
  }
  @keyframes sheen{
    0%,100%{ background-position:0% 0%; }
    50%{ background-position:100% 0%; }
  }
  @keyframes breathe{
    0%,100%{ filter:drop-shadow(0 1px 1px rgba(0,0,0,.65))
             drop-shadow(0 0 10px rgba(190,210,230,.45))
             drop-shadow(0 0 26px rgba(150,180,215,.28)); }
    50%{ filter:drop-shadow(0 1px 1px rgba(0,0,0,.65))
             drop-shadow(0 0 22px rgba(220,235,255,.9))
             drop-shadow(0 0 56px rgba(170,200,235,.5)); }
  }

  /* ---- the floating mirror film ---- */
  #mirror-wrap{
    position:fixed; left:50%; top:54%; transform:translate(-50%,-50%);
    z-index:5; height:min(74vh, 92vw); aspect-ratio:3/4;
    pointer-events:none;
    animation:levitate 7s ease-in-out infinite;
  }
  @keyframes levitate{
    0%,100%{ transform:translate(-50%,-50%) translateY(0); }
    50%{ transform:translate(-50%,-50%) translateY(-14px); }
  }
  #mirror-video{
    position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    /* screen-blend dissolves the white backing disc into the dark film,
       leaving the framed oval mirror floating free */
    mix-blend-mode:screen;
    /* gentle feather at the extreme edges only, so the full oval is visible */
    -webkit-mask-image:radial-gradient(ellipse 62% 74% at 50% 50%, #000 82%, rgba(0,0,0,.6) 92%, transparent 100%);
            mask-image:radial-gradient(ellipse 62% 74% at 50% 50%, #000 82%, rgba(0,0,0,.6) 92%, transparent 100%);
  }
  #mirror-wrap::after{ /* ambient glow around the floating mirror */
    content:""; position:absolute; inset:-6% -18%; z-index:-1; border-radius:50%;
    background:radial-gradient(ellipse 55% 62% at 50% 50%, rgba(150,40,44,.3), rgba(90,20,50,.13) 52%, transparent 74%);
    filter:blur(28px);
    animation:glow 5s ease-in-out infinite;
  }
  @keyframes glow{ 0%,100%{ opacity:.6; transform:scale(1); } 50%{ opacity:1; transform:scale(1.06); } }

  @media (prefers-reduced-motion:reduce){
    #invocation h1, #mirror-wrap, #mirror-wrap::after{ animation:none; }
  }
  @media (max-width:640px){
    #mirror-wrap{ height:auto; width:92vw; aspect-ratio:3/4; }
    #invocation{ top:6vh; }
  }
</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline preload="auto"
  src="https://pub-d162b784ec1e4b9480c9426577ad674c.r2.dev/0720-04.mp4"></video>
<div id="bg-tint"></div>

<a id="return-house" href="tablet-house.html">&#8592; The Tablet House</a>

<div id="invocation"><h1>Mirror, mirror</h1></div>

<div id="mirror-wrap">
  <video id="mirror-video" autoplay muted loop playsinline preload="auto"
    src="https://pub-d162b784ec1e4b9480c9426577ad674c.r2.dev/mirror.mp4"></video>
</div>

<script>
(function(){
  /* make sure both films run: retry on load and on first pointer interaction */
  var vids = [document.getElementById('bg-video'), document.getElementById('mirror-video')];
  function tryPlay(){ vids.forEach(function(v){ if(v && v.paused){ var p=v.play(); if(p&&p.catch) p.catch(function(){}); } }); }
  window.addEventListener('load', tryPlay);
  document.addEventListener('pointerdown', tryPlay, { once:true });
  tryPlay();
})();
</script>
</body>
</html>
