<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kronosphere — The Polychronic Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  @media (prefers-reduced-motion:reduce){ html{scroll-behavior:auto} }
  body {
    background:#000;
    color:#dcc4c0;
    font-family:"Cinzel",serif;
    overflow-x:hidden;
    cursor: url('data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2732%27%20height%3D%2732%27%20viewBox%3D%270%200%2032%2032%27%3E%3Cdefs%3E%3CradialGradient%20id%3D%27g%27%20cx%3D%2750%25%27%20cy%3D%2750%25%27%20r%3D%2750%25%27%3E%3Cstop%20offset%3D%270%25%27%20stop-color%3D%27rgb%28150%2C15%2C12%29%27%20stop-opacity%3D%270.95%27/%3E%3Cstop%20offset%3D%2735%25%27%20stop-color%3D%27rgb%28100%2C8%2C6%29%27%20stop-opacity%3D%270.55%27/%3E%3Cstop%20offset%3D%27100%25%27%20stop-color%3D%27rgb%2870%2C5%2C4%29%27%20stop-opacity%3D%270%27/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle%20cx%3D%2716%27%20cy%3D%2716%27%20r%3D%2713%27%20fill%3D%27url%28%23g%29%27/%3E%3Ccircle%20cx%3D%2716%27%20cy%3D%2716%27%20r%3D%272.2%27%20fill%3D%27rgb%28190%2C50%2C40%29%27%20opacity%3D%270.95%27/%3E%3C/svg%3E') 16 16, crosshair;
  }
  ::selection { background:rgba(140,25,20,.45); color:#f0e2c8; }

  /* ── return link ── */
  #return-apsu{
    position:fixed; top:1.2rem; left:1.4rem; z-index:30;
    font-size:.55rem; letter-spacing:.42em; text-transform:uppercase;
    color:rgba(200,170,118,.55); text-decoration:none;
    transition:color .4s ease;
  }
  #return-apsu:hover{ color:#e8d4a4; }

  /* ── hero: the wheel ── */
  #hero{
    position:relative;
    height:88vh; min-height:520px;
    display:flex; align-items:center; justify-content:center;
  }
  #wheel-canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  #wheel-center{
    position:relative; z-index:5; text-align:center; pointer-events:none;
  }
  #wheel-center .jdn{
    font-family:"Cinzel",serif; font-weight:600;
    font-size:clamp(1.1rem,3vw,1.7rem); letter-spacing:.18em;
    color:#c8aa76;
    text-shadow:0 0 22px rgba(200,150,90,.35);
  }
  #wheel-center .jdn-label{
    font-size:clamp(.4rem,1vw,.5rem); letter-spacing:.6em; text-transform:uppercase;
    color:rgba(200,170,118,.5); margin-top:.5rem;
  }
  #wheel-center .wday{
    font-size:clamp(.42rem,1.1vw,.55rem); letter-spacing:.5em; text-transform:uppercase;
    color:rgba(220,196,192,.42); margin-top:.9rem; font-style:italic;
  }
  #hero-title{
    position:absolute; top:2.2rem; left:50%; transform:translateX(-50%);
    text-align:center; z-index:6; pointer-events:none; white-space:nowrap;
  }
  #hero-title h1{
    font-family:"Uncial Antiqua",serif; font-weight:400;
    font-size:clamp(1.05rem,2.6vw,1.55rem); letter-spacing:.32em;
    color:#dcc4c0; opacity:.42; text-transform:uppercase;
  }
  #hero-title p{
    font-size:clamp(.38rem,.95vw,.5rem); letter-spacing:.6em;
    color:#d4a878; opacity:.6; margin-top:.4rem; text-transform:uppercase;
  }
  #hero-hint{
    position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
    font-size:clamp(.38rem,.9vw,.48rem); letter-spacing:.58em;
    color:#e0c090; opacity:0; text-transform:uppercase; white-space:nowrap;
    animation:hp 4s ease-in-out .6s infinite; pointer-events:none; z-index:6;
  }
  @keyframes hp{0%,100%{opacity:0}40%,60%{opacity:.55}}

  /* ── content column ── */
  main{ max-width:1020px; margin:0 auto; padding:0 22px 110px; position:relative; z-index:2; }

  .rite-head{ text-align:center; margin:2.5rem 0 1.6rem; }
  .rite-head h2{
    font-family:"Uncial Antiqua",serif; font-weight:400;
    font-size:clamp(.85rem,2vw,1.05rem); letter-spacing:.3em;
    color:rgba(220,196,192,.55); text-transform:uppercase;
  }
  .rite-head p{
    font-size:clamp(.42rem,1vw,.55rem); letter-spacing:.42em; text-transform:uppercase;
    color:rgba(200,170,118,.45); margin-top:.5rem;
  }

  /* ── the asking: date controls ── */
  #asking{
    display:flex; gap:1.6rem; justify-content:center; align-items:flex-end;
    flex-wrap:wrap; margin:0 0 1.2rem;
  }
  .ask-field label{
    display:block; font-size:.45rem; letter-spacing:.4em; text-transform:uppercase;
    color:rgba(200,170,118,.5); margin-bottom:.55rem; text-align:center;
  }
  .ask-field input, .ask-field select{
    background:transparent; border:none;
    border-bottom:1px solid rgba(200,170,118,.3);
    color:#e0c090; font-family:"Cinzel",serif; font-size:.95rem;
    letter-spacing:.14em; text-align:center; padding:.3rem .2rem .45rem;
    outline:none; transition:border-color .4s ease;
    border-radius:0; appearance:none; -webkit-appearance:none;
  }
  .ask-field input:focus, .ask-field select:focus{ border-color:rgba(230,200,150,.75); }
  .ask-field input::-webkit-outer-spin-button,
  .ask-field input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .ask-field input[type=number]{ -moz-appearance:textfield; }
  #cy{ width:5.2em; } #cm, #cd{ width:3em; }
  .ask-field select{ cursor:pointer; }
  .ask-field select option{ background:#0c0a08; color:#e0c090; }

  #ask-actions{ display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:3rem; }
  .rite-btn{
    font-family:"Cinzel",serif; font-size:.55rem; letter-spacing:.46em; text-transform:uppercase;
    color:#e0c090; background:linear-gradient(180deg,rgba(200,170,118,.09),rgba(10,7,5,.3));
    border:1px solid rgba(200,170,118,.32); border-radius:999px;
    padding:.8em 2em .8em 2.45em; cursor:pointer;
    transition:all .4s ease;
  }
  .rite-btn:hover{
    color:#f2dcae; border-color:rgba(230,200,150,.6);
    box-shadow:0 0 22px rgba(210,160,95,.22);
  }
  .rite-btn.ghost{ border-color:rgba(200,170,118,.16); color:rgba(224,192,144,.55); }
  .rite-btn.ghost:hover{ color:#e0c090; border-color:rgba(200,170,118,.4); }

  /* ── fault lines: travel points ── */
  #faults{
    display:flex; gap:.6rem; flex-wrap:wrap; justify-content:center;
    margin:0 0 3.4rem;
  }
  .fault-chip{
    font-family:"Cinzel",serif; font-size:.5rem; letter-spacing:.24em; text-transform:uppercase;
    color:rgba(220,196,192,.5);
    border:1px solid rgba(200,170,118,.14); border-radius:999px;
    background:rgba(20,15,12,.4);
    padding:.7em 1.3em; cursor:pointer; transition:all .35s ease;
    text-align:center;
  }
  .fault-chip .fy{ display:block; color:rgba(200,170,118,.65); letter-spacing:.18em; margin-bottom:.25em; font-size:.55rem; }
  .fault-chip:hover{
    color:#e8d4a4; border-color:rgba(200,150,90,.5);
    box-shadow:0 0 16px rgba(140,25,20,.25), inset 0 0 12px rgba(200,150,90,.06);
  }

  /* ── the reading: readout tablets ── */
  #readout{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:14px;
  }
  .readcell{
    background:linear-gradient(160deg, rgba(28,21,16,.72), rgba(10,7,5,.85));
    border:1px solid rgba(200,170,118,.15);
    border-radius:5px; padding:16px 18px 15px;
    position:relative; overflow:hidden;
    transition:border-color .5s ease, box-shadow .5s ease;
  }
  .readcell::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(ellipse at 18% 0%, rgba(200,150,90,.07), transparent 55%);
    pointer-events:none;
  }
  .readcell:hover{
    border-color:rgba(200,170,118,.38);
    box-shadow:0 0 20px rgba(200,150,90,.08), inset 0 0 24px rgba(0,0,0,.5);
  }
  .readcell .sys{
    font-size:.48rem; letter-spacing:.34em; text-transform:uppercase;
    color:rgba(200,170,118,.62); margin-bottom:.55rem;
  }
  .readcell .val{
    font-size:.92rem; letter-spacing:.05em; color:#e6d3c9; line-height:1.5;
  }
  .readcell .note{
    font-size:.68rem; font-style:italic; color:rgba(155,138,130,.75);
    margin-top:.5rem; letter-spacing:.03em; line-height:1.5;
  }

  /* fade-in when a reading arrives */
  #readout.arriving .readcell{ animation:tablet-rise .9s ease both; }
  #readout.arriving .readcell:nth-child(2n){ animation-delay:.08s; }
  #readout.arriving .readcell:nth-child(3n){ animation-delay:.16s; }
  #readout.arriving .readcell:nth-child(5n){ animation-delay:.24s; }
  @keyframes tablet-rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  footer{
    text-align:center; margin-top:5rem;
    font-size:.45rem; letter-spacing:.5em; text-transform:uppercase;
    color:rgba(200,170,118,.35);
  }

  /* ── mobile ── */
  @media (max-width:600px){
    #hero{ height:74vh; min-height:440px; }
    #hero-title h1{ font-size:1rem; letter-spacing:.22em; }
    #asking{ gap:1.1rem; }
    .ask-field input, .ask-field select{ font-size:1rem; }
    .fault-chip{ font-size:.52rem; }
    #readout{ grid-template-columns:1fr; }
    #return-apsu{ font-size:.5rem; letter-spacing:.3em; }
  }
</style>
</head>
<body>

<a id="return-apsu" href="index.html">&#8592; Apsu</a>

<section id="hero">
  <canvas id="wheel-canvas"></canvas>
  <div id="hero-title">
    <h1>Kronosphere</h1>
    <p>The Polychronic Codex</p>
  </div>
  <div id="wheel-center">
    <div class="jdn" id="jdnToday">&mdash;</div>

<main>
  <div class="rite-head">

  <footer>one unbroken count beneath every system</footer>
</main>

<script>
/* ================================================================
   THE POLYCHRONIC ENGINE — self-contained, no dependencies
   All conversions route through the Julian Day Number (JDN).
   Integer JDN labels a noon-to-noon day; JDN mod 7: 0 = Monday.
   Astronomical year numbering throughout (1 BCE = 0).
   ================================================================ */
const F = Math.floor;
const mod = (a,n)=>((a%n)+n)%n;

/* ---------- Gregorian (proleptic-safe) ---------- */
function gregorianToJDN(y,m,d){
  const a=F((14-m)/12), y2=y+4800-a, m2=m+12*a-3;
  return d+F((153*m2+2)/5)+365*y2+F(y2/4)-F(y2/100)+F(y2/400)-32045;
}
function jdnToGregorian(jdn){
  const a=jdn+32044, b=F((4*a+3)/146097), c=a-F(146097*b/4),
        d=F((4*c+3)/1461), e=c-F(1461*d/4), m=F((5*e+2)/153);
  return {y:100*b+d-4800+F(m/10), m:m+3-12*F(m/10), d:e-F((153*m+2)/5)+1};
}
/* ---------- Julian ---------- */
function julianToJDN(y,m,d){
  const a=F((14-m)/12), y2=y+4800-a, m2=m+12*a-3;
  return d+F((153*m2+2)/5)+365*y2+F(y2/4)-32083;
}
function jdnToJulian(jdn){
  const c=jdn+32082, d=F((4*c+3)/1461), e=c-F(1461*d/4), m=F((5*e+2)/153);
  return {y:d-4800+F(m/10), m:m+3-12*F(m/10), d:e-F((153*m+2)/5)+1};
}
const WEEKDAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const weekday=jdn=>WEEKDAYS[mod(jdn,7)];

/* ---------- Hebrew (full molad arithmetic + dehiyyot) ---------- */
const hebrewLeap = y => mod(7*y+1,19) < 7;
function hebrewTishri1(y){                      // JDN of 1 Tishri, year y AM
  const me = 235*F((y-1)/19) + 12*mod(y-1,19) + F((7*mod(y-1,19)+1)/19);
  const pe = 204 + 793*mod(me,1080);
  const he = 5 + 12*me + 793*F(me/1080) + F(pe/1080);
  let day = 1 + 29*me + F(he/24);
  const parts = mod(he,24)*1080 + mod(pe,1080);
  if (parts>=19440
      || (mod(day,7)===2 && parts>=9924  && !hebrewLeap(y))
      || (mod(day,7)===1 && parts>=16789 &&  hebrewLeap(y-1))) day++;
  if ([0,3,5].includes(mod(day,7))) day++;      // never Sun/Wed/Fri
  return day + 347997;                          // epoch: AM 1 → JDN 347,998
}
const HEBMONTHS=["Tishri","Heshvan","Kislev","Tevet","Shevat","Adar I","Adar","Nisan","Iyar","Sivan","Tammuz","Av","Elul"];
function hebrewMonthLengths(y){
  const len = hebrewTishri1(y+1)-hebrewTishri1(y), leap = len>380;
  const chesh = (len%10===5)?30:29, kis = (len%10===3)?29:30;
  const L=[30,chesh,kis,29,30];
  if(leap) L.push(30);            // Adar I
  L.push(29,30,29,30,29,30,29);   // Adar(II), Nisan..Elul
  return {L,leap};
}
function hebrewFromJDN(jdn){
  let y = F((jdn-347998)/365.2468)+1; if(y<1)y=1;
  while (hebrewTishri1(y+1)<=jdn) y++;
  while (hebrewTishri1(y)>jdn)   y--;
  let rem = jdn - hebrewTishri1(y);
  const {L,leap} = hebrewMonthLengths(y);
  let i=0; while (rem>=L[i]){rem-=L[i];i++;}
  const names = leap ? HEBMONTHS
    : HEBMONTHS.slice(0,5).concat(HEBMONTHS.slice(6));
  return {y, month:names[i], d:rem+1, leap};
}

/* ---------- Islamic (tabular civil; epoch JDN 1,948,440) ---------- */
const ISLMONTHS=["Muharram","Safar","Rabi I","Rabi II","Jumada I","Jumada II","Rajab","Sha'ban","Ramadan","Shawwal","Dhu al-Qa'dah","Dhu al-Hijjah"];
function islamicToJDN(y,m,d){
  return d + Math.ceil(29.5*(m-1)) + (y-1)*354 + F((3+11*y)/30) + 1948439;
}
function islamicFromJDN(jdn){
  let y = F((30*(jdn-1948440)+10646)/10631);
  while (islamicToJDN(y+1,1,1)<=jdn) y++;
  while (islamicToJDN(y,1,1)>jdn)   y--;
  let m=1; while (m<12 && islamicToJDN(y,m+1,1)<=jdn) m++;
  return {y, m, month:ISLMONTHS[m-1], d: jdn-islamicToJDN(y,m,1)+1};
}

/* ---------- Persian Solar Hijri (33-yr arithmetic; Nowruz-anchored) ---------- */
const PMONTHS=["Farvardin","Ordibehesht","Khordad","Tir","Mordad","Shahrivar","Mehr","Aban","Azar","Dey","Bahman","Esfand"];
const P_LEAP_RES=[1,5,9,13,17,22,26,30];
const persianLeap = y => P_LEAP_RES.includes(mod(y,33));
function persianLeapsBefore(y){                  // leap years among 1..y-1
  const n=y-1, c=F(n/33), r=mod(n,33);
  return 8*c + P_LEAP_RES.filter(x=>x<=r).length;
}
function persianToJDN(y,m,d){
  const doy = (m<=6 ? (m-1)*31 : 186+(m-7)*30) + d;
  return 1948319 + 365*(y-1) + persianLeapsBefore(y) + doy;
}
function persianFromJDN(jdn){
  let y = F((jdn-1948320)/365.24219)+1;
  while (persianToJDN(y+1,1,1)<=jdn) y++;
  while (persianToJDN(y,1,1)>jdn)   y--;
  let doy = jdn - persianToJDN(y,1,1) + 1, m, d;
  if (doy<=186){ m=Math.ceil(doy/31); d=doy-(m-1)*31; }
  else { m=Math.ceil((doy-186)/30)+6; d=doy-186-(m-7)*30; }
  return {y, m, month:PMONTHS[m-1], d};
}

/* ---------- Mayan: Long Count + Calendar Round (GMT 584,283) ---------- */
const TZNAMES=["Imix","Ik'","Ak'b'al","K'an","Chikchan","Kimi","Manik'","Lamat","Muluk","Ok","Chuwen","Eb'","B'en","Ix","Men","K'ib'","Kab'an","Etz'nab'","Kawak","Ajaw"];
const HAABMONTHS=["Pop","Wo","Sip","Sotz'","Sek","Xul","Yaxk'in","Mol","Ch'en","Yax","Sak","Keh","Mak","K'ank'in","Muwan","Pax","K'ayab'","Kumk'u","Wayeb'"];
function mayanFromJDN(jdn){
  const d = jdn-584283;
  const bak=F(d/144000), r1=mod(d,144000), kat=F(r1/7200), r2=mod(r1,7200),
        tun=F(r2/360), r3=mod(r2,360), win=F(r3/20), kin=mod(r3,20);
  const tzNum = mod(d+3,13)+1, tzName = TZNAMES[mod(d+19,20)];
  const hd = mod(d+348,365), hm = F(hd/20)>17?18:F(hd/20);
  const haabDay = hm===18 ? hd-360 : mod(hd,20);
  return {lc:`${bak}.${kat}.${tun}.${win}.${kin}`,
          cr:`${tzNum} ${tzName} ${haabDay} ${HAABMONTHS[hm]}`, preEpoch:d<0};
}

/* ---------- Coptic & Ethiopic (Alexandrian year) ---------- */
const COPTM=["Thout","Paopi","Hathor","Koiak","Tobi","Meshir","Paremhat","Parmouti","Pashons","Paoni","Epip","Mesori","Pi Kogi"];
const ETHM=["Mäskäräm","Ṭəqəmt","Ḫədar","Taḫśaś","Ṭərr","Yäkatit","Mägabit","Miyazya","Gənbot","Säne","Ḥamle","Nähase","Ṗagume"];
function alexToJDN(base,y,m,d){ return base + 365*(y-1) + F(y/4) + 30*(m-1) + d; }
function alexFromJDN(base,jdn){
  let y=F((jdn-base)/365.25); if(y<1)y=1;
  while (alexToJDN(base,y+1,1,1)<=jdn) y++;
  while (alexToJDN(base,y,1,1)>jdn)   y--;
  const days = jdn-alexToJDN(base,y,1,1);
  return {y, m:F(days/30)+1, d:mod(days,30)+1};
}
const copticFromJDN  = j=>alexFromJDN(1825029,j);   // Era of Martyrs
const ethiopicFromJDN= j=>alexFromJDN(1724220,j);   // Amätä Məhrät

/* ---------- French Republican (historical + Romme extrapolation) ---------- */
const FRM=["Vendémiaire","Brumaire","Frimaire","Nivôse","Pluviôse","Ventôse","Germinal","Floréal","Prairial","Messidor","Thermidor","Fructidor","Sansculottides"];
const frLeap = y => y<15 ? [3,7,11].includes(y)
                         : (y%4===0 && (y%100!==0 || y%400===0));
function frYearStart(y){
  let s=2375840; for(let j=1;j<y;j++) s += frLeap(j)?366:365; return s;
}
function republicanFromJDN(jdn){
  if (jdn<2375840) return null;
  let y=1; while (frYearStart(y+1)<=jdn) y++;
  const doy=jdn-frYearStart(y);
  return {y, m:F(doy/30)+1, month:FRM[Math.min(F(doy/30),12)], d:mod(doy,30)+1, extrapolated:y>14};
}

/* ---------- Chinese sexagenary ---------- */
const STEMS=["Jiǎ 甲","Yǐ 乙","Bǐng 丙","Dīng 丁","Wù 戊","Jǐ 己","Gēng 庚","Xīn 辛","Rén 壬","Guǐ 癸"];
const BRANCHES=["Zǐ 子 Rat","Chǒu 丑 Ox","Yín 寅 Tiger","Mǎo 卯 Rabbit","Chén 辰 Dragon","Sì 巳 Snake","Wǔ 午 Horse","Wèi 未 Goat","Shēn 申 Monkey","Yǒu 酉 Rooster","Xū 戌 Dog","Hài 亥 Pig"];

/* ---------- Easter computus ---------- */
function easterGregorian(y){                     // Butcher; valid for Gregorian years
  const a=y%19,b=F(y/100),c=y%100,d=F(b/4),e=b%4,f=F((b+8)/25),g=F((b-f+1)/3),
        h=(19*a+b-d-g+15)%30,i=F(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=F((a+11*h+22*l)/451);
  return {m:F((h+l-7*m+114)/31), d:((h+l-7*m+114)%31)+1};
}
function easterJulianJDN(y){                     // Meeus Julian computus → JDN
  const a=y%4,b=y%7,c=y%19,d=(19*c+15)%30,e=(2*a+4*b-d+34)%7;
  return julianToJDN(y, F((d+e+114)/31), ((d+e+114)%31)+1);
}
/* ---------- ΔT (Espenak–Meeus piecewise, seconds) ---------- */
function deltaT(y){
  let u,t;
  if(y<-500||y>=2150){u=(y-1820)/100;let dt=-20+32*u*u;if(y>=2050&&y<2150)dt-=0.5628*(2150-y);return dt;}
  if(y<500){u=y/100;return 10583.6-1014.41*u+33.78311*u**2-5.952053*u**3-0.1798452*u**4+0.022174192*u**5+0.0090316521*u**6;}
  if(y<1600){u=(y-1000)/100;return 1574.2-556.01*u+71.23472*u**2+0.319781*u**3-0.8503463*u**4-0.005050998*u**5+0.0083572073*u**6;}
  if(y<1700){t=y-1600;return 120-0.9808*t-0.01532*t*t+t**3/7129;}
  if(y<1800){t=y-1700;return 8.83+0.1603*t-0.0059285*t*t+0.00013336*t**3-t**4/1174000;}
  if(y<1860){t=y-1800;return 13.72-0.332447*t+0.0068612*t*t+0.0041116*t**3-0.00037436*t**4+0.0000121272*t**5-0.0000001699*t**6+0.000000000875*t**7;}
  if(y<1900){t=y-1860;return 7.62+0.5737*t-0.251754*t*t+0.01680668*t**3-0.0004473624*t**4+t**5/233174;}
  if(y<1920){t=y-1900;return -2.79+1.494119*t-0.0598939*t*t+0.0061966*t**3-0.000197*t**4;}
  if(y<1941){t=y-1920;return 21.20+0.84493*t-0.076100*t*t+0.0020936*t**3;}
  if(y<1961){t=y-1950;return 29.07+0.407*t-t*t/233+t**3/2547;}
  if(y<1986){t=y-1975;return 45.45+1.067*t-t*t/260-t**3/718;}
  if(y<2005){t=y-2000;return 63.86+0.3345*t-0.060374*t*t+0.0017275*t**3+0.000651814*t**4+0.00002373599*t**5;}
  t=y-2000;return 62.92+0.32217*t+0.005589*t*t;   // 2005–2050
}
/* ---------- March equinox (Meeus mean; ±minutes without periodic terms) ---------- */
function marchEquinoxJD(y){
  if(y>=1000){const Y=(y-2000)/1000;return 2451623.80984+365242.37404*Y+0.05169*Y*Y-0.00411*Y**3-0.00057*Y**4;}
  const Y=y/1000;return 1721139.29189+365242.13740*Y+0.06134*Y*Y+0.00111*Y**3-0.00071*Y**4;
}

/* ---------- Balinese Pawukon (anchor per Dershowitz–Reingold; verified vs Galungan 2025) ---------- */
const WUKU=["Sinta","Landep","Ukir","Kulantir","Tolu","Gumbreg","Wariga","Warigadian","Julungwangi","Sungsang","Dungulan","Kuningan","Langkir","Medangsia","Pujut","Pahang","Krulut","Merakih","Tambir","Medangkungan","Matal","Uye","Menail","Prangbakat","Bala","Ugu","Wayang","Kelawu","Dukut","Watugunung"];
const SAPTA=["Soma","Anggara","Buda","Wrespati","Sukra","Saniscara","Redite"];   // index = jdn mod 7 (0=Mon)
const PANCA=["Umanis","Paing","Pon","Wage","Kliwon"];
const TRI=["Pasah","Beteng","Kajeng"];
function pawukon(jdn){
  const p0=mod(jdn-146,210);
  const sapta=SAPTA[mod(jdn,7)];
  const pancaIdx=mod(p0+2,5); const pancaName=PANCA[pancaIdx===0?4:pancaIdx-1];
  const tri=TRI[mod(p0,3)];
  const day=p0+1, wuku=WUKU[F(p0/7)];
  const tags=[];
  if(tri==="Kajeng"&&pancaName==="Kliwon") tags.push("Kajeng-Kliwon");
  if(sapta==="Saniscara"&&pancaName==="Kliwon") tags.push("Tumpek");
  if(day===74) tags.unshift("Galungan"); if(day===84) tags.unshift("Kuningan");
  return {day,wuku,sapta,panca:pancaName,tri,tags};
}

/* ---------- Yallop crescent-visibility q-test (inputs from ephemeris) ---------- */
function yallopQ(arcv,w){                        // arcv: arc of vision (deg); w: topocentric width (arcmin)
  const q=(arcv-(11.8371-6.3226*w+0.7319*w*w-0.1018*w**3))/10;
  const band=q>0.216?["A","easily visible to the naked eye"]:
             q>-0.014?["B","visible under perfect conditions"]:
             q>-0.160?["C","may need optical aid to find the crescent"]:
             q>-0.232?["D","visible only with optical aid"]:
             q>-0.293?["E","not visible with a telescope"]:["F","not visible; below the Danjon limit"];
  return {q:+q.toFixed(3), code:band[0], meaning:band[1]};
}

function readMoment(jdn){

  out.push(cell("Julian calendar", `${j.d} ${MN[j.m-1]} ${bce(j.y)}`, jdn<2299161?"civil standard before 15 Oct 1582":"liturgical / Old Style"));

    const we=easterGregorian(gy), oj=jdnToGregorian(easterJulianJDN(gy));
    out.push(cell("Easter of this year",
      `Western ${we.d} ${MN[we.m-1]} · Orthodox ${oj.d} ${MN[oj.m-1]} (civil)`,
      "Butcher / Julian computus"));
  }
  const eqG=jdnToGregorian(Math.round(marchEquinoxJD(gy)));
  out.push(cell("Astronomical frame",
    `March equinox ≈ ${eqG.d} ${MN[eqG.m-1]} · ΔT ≈ ${Math.round(deltaT(gy))} s`,
    "mean equinox; ΔT per Espenak–Meeus"));
  /* --- Aztec --- */
  const tz2=tonalpohualli(jdn), yb=aztecYearBearer(gy);
  out.push(cell("Aztec — Tōnalpōhualli", `${tz2.n}-${tz2.sign}`,
    `year bearer ${yb.n}-${yb.sign} (±, year begins spring) · Caso anchor`));
  /* --- Maya deep cycles --- */
  const vp=venusPhase(jdn);
  out.push(cell("Maya deep cycles",
    `Lord of the Night ${lordOfNight(jdn)} · Venus: ${vp.phase} d ${vp.day}/${vp.of}`,
    `moon age ≈ ${moonAgeAtJDN(jdn).toFixed(1)} d · mean tithi ${meanTithi(jdn)}`));
  /* --- Pawukon --- */
  const pw=pawukon(jdn);
  out.push(cell("Balinese Pawukon",
    `day ${pw.day}/210 · wuku ${pw.wuku} · ${pw.sapta} ${pw.panca} ${pw.tri}`,
    pw.tags.length?pw.tags.join(" · "):"no cross-cycle station today"));
  /* --- Tibetan --- */
  const rj=tibetanRabjung(gy);
  if(rj) out.push(cell("Tibetan — rabjung", `cycle ${rj.cycle}, year ${rj.year}`,"Losar-adjusted ±; element-animal shared with sexagenary"));
  /* --- regional era cluster --- */
  out.push(cell("Regional eras",
    `Spanish ${fmt(gy+38)} · Chula Sakarat ${fmt(gy-638)} · Dangun ${fmt(gy+2333)} · Kurdish ${fmt(gy+700)}`,
    `Nanakshahi ${gy-1468} · Amazigh ${fmt(gy+950)} · Armenian ≈ ${jdn>=1922868?fmt(F((jdn-1922868)/365)+1):"before the count"}`));
  /* --- small cycles --- */
  const ice=jdnToGregorian(icelandicSummer(gy));
  out.push(cell("Small cycles",
    `Indiction ${indiction(gy)} · ${h.y%7===0?"SHMITA year (AM "+fmt(h.y)+")":"shmita in "+(7-mod(h.y,7))+" Hebrew yrs"}`,
    `Icelandic First Day of Summer: ${ice.d} ${MN[ice.m-1]} · day-ruler: ${["Moon","Mars","Mercury","Jupiter","Venus","Saturn","Sun"][mod(jdn,7)]}`));
  return out.join("");
}

/* ════════════════════════════════════════════════════════
   THE WHEEL — nested rings of etched signs, cycles in cycles
   ════════════════════════════════════════════════════════ */
var canvas=document.getElementById('wheel-canvas');
var ctx=canvas.getContext('2d');
var W,H,CX,CY,BASE_R,T=0;
var DPR=Math.min(window.devicePixelRatio||1,2);

var ETCH=[200,170,118];
var IRIS=[
  [235,215,220],[200,90,85],[140,25,20],[230,170,150],
  [110,140,220],[220,180,90],[180,60,50],[240,230,235]
];
function irisCol(v){
  v=((v%1)+1)%1;
  var f=v*IRIS.length,i=Math.floor(f),fr=f-i;
  var a=IRIS[i%IRIS.length],b=IRIS[(i+1)%IRIS.length];
  return [Math.round(a[0]+(b[0]-a[0])*fr),Math.round(a[1]+(b[1]-a[1])*fr),Math.round(a[2]+(b[2]-a[2])*fr)];
}

var SIGNS=[
  [[-0.6,-0.6,0.6,0.6],[0.6,-0.6,-0.6,0.6],[-0.7,0,0.7,0],[0,-0.7,0,0.7]],
  [[-0.7,-0.35,0.7,-0.35],[-0.7,0,0.7,0],[-0.7,0.35,0.7,0.35],[0.55,-0.35,0.55,0.6]],
  [[-0.7,0,0.7,0],[0,-0.7,0,0.7],[-0.5,-0.5,0.5,0.5],[0.5,-0.5,-0.5,0.5]],
  [[-0.6,-0.4,0.6,-0.4],[-0.6,0,0.6,0],[-0.6,0.4,0.6,0.4],[0.5,-0.4,0.5,0.6]],
  [[0,-0.7,0,0.7],[-0.55,-0.15,0.05,-0.15],[-0.45,0.25,0.05,0.25]],
  [[-0.6,-0.6,-0.6,0.6],[-0.6,0.6,0.6,0.6],[0.1,-0.2,0.1,0.6]],
  [[-0.7,0.3,0,0],[0,-0.65,0,0],[0.7,0.3,0,0],[0,0,0,0.5]],
  [[-0.75,0,0.75,0],[0,0,0,0.65],[-0.4,0.3,0.4,0.3]],
  [[0,-0.6,0.5,0.2],[0.5,0.2,-0.5,0.2],[-0.5,0.2,0,-0.6],[0,0.2,0,0.6]],
  [[-0.6,-0.3,0.6,-0.3],[-0.3,-0.6,-0.3,0.6],[0.3,-0.6,0.3,0.6]],
  [[-0.5,-0.5,0.5,-0.5],[0.5,-0.5,0.5,0.5],[0.5,0.5,-0.5,0.5],[-0.5,0.5,-0.5,-0.5]],
  [[0,-0.7,-0.5,0.3],[0,-0.7,0.5,0.3],[-0.3,0,0.3,0]],
];

function drawEtchedSign(sign,cx,cy,size,alpha,col,rotAng){
  if(alpha<=0.01)return;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rotAng);
  ctx.globalAlpha=alpha;
  ctx.strokeStyle='rgb('+col[0]+','+col[1]+','+col[2]+')';
  ctx.lineWidth=Math.max(0.6,size*0.09);
  ctx.lineCap='round';
  ctx.beginPath();
  for(var i=0;i<sign.length;i++){
    var s=sign[i];
    ctx.moveTo(s[0]*size,s[1]*size);
    ctx.lineTo(s[2]*size,s[3]*size);
  }
  ctx.stroke();
  ctx.fillStyle='rgb('+col[0]+','+col[1]+','+col[2]+')';
  for(var j=0;j<sign.length;j++){
    var s2=sign[j];
    ctx.beginPath();
    ctx.arc(s2[0]*size,s2[1]*size,Math.max(0.7,size*0.10),0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

/* rings: outermost slow like precession, innermost quick like the day */
var RINGS=[
  {r:1.00, count:30, speed:0.00035, dir: 1, size:0.052},
  {r:0.84, count:24, speed:0.00075, dir:-1, size:0.055},
  {r:0.67, count:19, speed:0.00135, dir: 1, size:0.058},
  {r:0.50, count:13, speed:0.00230, dir:-1, size:0.062},
  {r:0.33, count: 8, speed:0.00390, dir: 1, size:0.066},
];
RINGS.forEach(function(ring){
  ring.glyphs=[];
  for(var i=0;i<ring.count;i++){
    ring.glyphs.push({
      base:(i/ring.count)*Math.PI*2,
      sign:Math.floor(Math.random()*SIGNS.length),
      jitter:Math.random()*0.06-0.03
    });
  }
  ring.rot0=Math.random()*Math.PI*2;
});

var pulse=0; /* 0..1, decays; boosts speed + glow on a reading */
function pulseWheel(){ pulse=1; }

var hero=document.getElementById('hero');
function resize(){
  var rect=hero.getBoundingClientRect();
  W=rect.width; H=rect.height;
  canvas.width=Math.round(W*DPR);
  canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX=W/2; CY=H*0.52;
  BASE_R=Math.min(W*0.44,H*0.40,340);
}
window.addEventListener('resize',resize);

function drawWheel(){
  T++;
  if(pulse>0){ pulse*=0.985; if(pulse<0.005)pulse=0; }
  ctx.clearRect(0,0,W,H);

  /* halo behind the wheel */
  var halo=ctx.createRadialGradient(CX,CY,BASE_R*0.1,CX,CY,BASE_R*1.6);
  halo.addColorStop(0,'rgba(125,95,62,'+(0.10+pulse*0.10)+')');
  halo.addColorStop(0.6,'rgba(70,50,32,'+(0.05+pulse*0.05)+')');
  halo.addColorStop(1,'rgba(30,20,12,0)');
  ctx.beginPath();ctx.arc(CX,CY,BASE_R*1.6,0,Math.PI*2);
  ctx.fillStyle=halo;ctx.fill();

  /* dark disc so the center JDN reads clearly */
  var disc=ctx.createRadialGradient(CX,CY,BASE_R*0.02,CX,CY,BASE_R*0.30);
  disc.addColorStop(0,'rgba(8,6,4,0.85)');
  disc.addColorStop(1,'rgba(8,6,4,0)');
  ctx.beginPath();ctx.arc(CX,CY,BASE_R*0.30,0,Math.PI*2);
  ctx.fillStyle=disc;ctx.fill();

  var shimmerAng=T*0.006;

  for(var ri=0;ri<RINGS.length;ri++){
    var ring=RINGS[ri];
    var R=BASE_R*ring.r;

    /* faint guide circle */
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(155,122,80,'+(0.06+pulse*0.06)+')';
    ctx.lineWidth=0.7;ctx.stroke();

    var rot=ring.rot0+T*ring.speed*ring.dir*(1+pulse*2.2);

    for(var gi=0;gi<ring.glyphs.length;gi++){
      var g=ring.glyphs[gi];
      var ang=g.base+rot;
      var x=CX+Math.cos(ang)*R;
      var y=CY+Math.sin(ang)*R;
      var size=BASE_R*ring.size;

      var col=[ETCH[0]+g.jitter*90,ETCH[1]+g.jitter*70,ETCH[2]+g.jitter*55];

      /* iris shimmer sweeps around like on the orb */
      var shimDist=Math.abs(((ang-shimmerAng)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI);
      var shim=Math.max(0,1-shimDist/0.7)*(1+pulse);
      if(shim>0.02){
        var sc=irisCol(ring.r*0.6+T*0.002);
        col=[col[0]+(sc[0]-col[0])*Math.min(1,shim)*0.75,
             col[1]+(sc[1]-col[1])*Math.min(1,shim)*0.75,
             col[2]+(sc[2]-col[2])*Math.min(1,shim)*0.75];
      }
      col=[Math.round(col[0]),Math.round(col[1]),Math.round(col[2])];

      var alpha=(0.45+0.35*Math.sin(g.base*3+T*0.01)+shim*0.2)*(0.85+pulse*0.3);
      alpha=Math.max(0.12,Math.min(1,alpha));

      /* glyph rotated to stand on the ring, like signs carved around a seal */
      drawEtchedSign(SIGNS[g.sign],x,y,size,alpha,col,ang+Math.PI/2);
    }
  }
  requestAnimationFrame(drawWheel);
}

/* touch the wheel: pulse + re-read */
canvas.addEventListener('click',function(){ pulseWheel(); runConverter(); });
canvas.addEventListener('touchstart',function(e){ pulseWheel(); runConverter(); },{passive:true});

/* ════════════════════════════════════════════════════════
   WIRING — the asking, the fault lines, the reading
   ════════════════════════════════════════════════════════ */
function astroYear(){
  var y=parseInt(document.getElementById('cy').value,10);
  var era=document.getElementById('cera').value;
  if(isNaN(y))return NaN;
  return era==='bce' ? 1-y : y;
}

function runConverter(){
  var y=astroYear(),
      m=parseInt(document.getElementById('cm').value,10),
      d=parseInt(document.getElementById('cd').value,10),
      cal=document.getElementById('ccal').value;
  if([y,m,d].some(isNaN))return;
  var jdn = cal==='g' ? gregorianToJDN(y,m,d) : julianToJDN(y,m,d);

  var readout=document.getElementById('readout');
  readout.classList.remove('arriving');
  void readout.offsetWidth; /* restart the rise animation */
  readout.innerHTML=readMoment(jdn);
  readout.classList.add('arriving');

  /* center of the wheel shows the asked moment */
  document.getElementById('jdnToday').textContent=fmt(jdn);
  document.getElementById('wdayNow').textContent=weekday(jdn);
  var g=jdnToGregorian(jdn);
  var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var eraStr=g.y<=0?(1-g.y)+' BCE':g.y+' CE';
  document.getElementById('reading-sub').textContent=
    g.d+' '+MN[g.m-1]+' '+eraStr+' — in every tongue of time';
}

function setDate(y,m,d,cal){
  var cyEl=document.getElementById('cy'),ceraEl=document.getElementById('cera');
  if(y<=0){ cyEl.value=1-y; ceraEl.value='bce'; }
  else{ cyEl.value=y; ceraEl.value='ce'; }
  document.getElementById('cm').value=m;
  document.getElementById('cd').value=d;
  document.getElementById('ccal').value=cal||'g';
  pulseWheel();
  runConverter();
}

/* fault lines → travel points; each lands on a resonant day */
var FAULT_JUMPS=[
  [-3149,1,1],   /* cluster of beginnings */
  [-2199,1,1],   /* 4.2-kyr event */
  [-1199,1,1],   /* Bronze Age collapse */
  [-499,1,1],    /* Axial Age */
  [-538,10,12],  /* Babylon falls */
  [622,7,19],    /* one epoch, two calendars */
  [1582,10,15],  /* Gregorian cascade begins */
  [1792,9,22],   /* An I */
  [1970,1,1],    /* Unix epoch */
  [2012,12,21],  /* 13.0.0.0.0 */
];
(function buildFaults(){
  var wrap=document.getElementById('faults');
  FAULT_LINES.forEach(function(f,i){
    var chip=document.createElement('button');
    chip.className='fault-chip';
    chip.innerHTML='<span class="fy">'+f.span+'</span>'+f.label;
    chip.addEventListener('click',function(){
      var j=FAULT_JUMPS[i];
      setDate(j[0],j[1],j[2],'g');
      document.getElementById('readout').scrollIntoView({behavior:'smooth',block:'start'});
    });
    wrap.appendChild(chip);
  });
})();

document.getElementById('convertBtn').addEventListener('click',function(){
  pulseWheel(); runConverter();
});
document.getElementById('nowBtn').addEventListener('click',function(){
  var now=new Date();
  setDate(now.getUTCFullYear(),now.getUTCMonth()+1,now.getUTCDate(),'g');
});

/* enter on any input reads the moment */
['cy','cm','cd'].forEach(function(id){
  document.getElementById(id).addEventListener('keydown',function(e){
    if(e.key==='Enter'){ pulseWheel(); runConverter(); }
  });
});

/* ── init: today ── */
(function(){
  var now=new Date();
  document.getElementById('cy').value=now.getUTCFullYear();
  document.getElementById('cm').value=now.getUTCMonth()+1;
  document.getElementById('cd').value=now.getUTCDate();
  resize();
  runConverter();
  drawWheel();
})();
</script>
