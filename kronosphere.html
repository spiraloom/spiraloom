<script>
/* ================================================================
   THE POLYCHRONIC ENGINE — self-contained, no dependencies
   All conversions route through the Julian Day Number (JDN).
   Integer JDN labels a noon-to-noon day; JDN mod 7: 0 = Monday.
   Astronomical year numbering throughout (1 BCE = 0).
   ================================================================ */
const F = Math.floor;
const mod = (a,n)=>((a%n)+n)%n;

/* ---------- Gregorian (proleptic-safe) ---------- */
function gregorianToJDN(y,m,d){
  const a=F((14-m)/12), y2=y+4800-a, m2=m+12*a-3;
  return d+F((153*m2+2)/5)+365*y2+F(y2/4)-F(y2/100)+F(y2/400)-32045;
}
function jdnToGregorian(jdn){
  const a=jdn+32044, b=F((4*a+3)/146097), c=a-F(146097*b/4),
        d=F((4*c+3)/1461), e=c-F(1461*d/4), m=F((5*e+2)/153);
  return {y:100*b+d-4800+F(m/10), m:m+3-12*F(m/10), d:e-F((153*m+2)/5)+1};
}
/* ---------- Julian ---------- */
function julianToJDN(y,m,d){
  const a=F((14-m)/12), y2=y+4800-a, m2=m+12*a-3;
  return d+F((153*m2+2)/5)+365*y2+F(y2/4)-32083;
}
function jdnToJulian(jdn){
  const c=jdn+32082, d=F((4*c+3)/1461), e=c-F(1461*d/4), m=F((5*e+2)/153);
  return {y:d-4800+F(m/10), m:m+3-12*F(m/10), d:e-F((153*m+2)/5)+1};
}

/* ════════════════════════════════════════════════════════
   ECLIPSE CANON — lazy decode of the packed Five Millennium
   Canon (Espenak & Meeus): 11,898 solar eclipses, 2000 BCE
   to 3000 CE. Verified against the raw catalog (Thales' 585
   BCE eclipse resolves to the exact day, type, saros, and
   coordinates).
   ════════════════════════════════════════════════════════ */
var ECL=null;
function eclDecode(){
  if(ECL)return ECL;
  var B36="0123456789abcdefghijklmnopqrstuvwxyz";
  function u36(s){var n=0;for(var i=0;i<s.length;i++)n=n*36+B36.indexOf(s[i]);return n;}
  var N=ECL_PACKED.length/13;
  var E={jdn:new Float64Array(N),t:new Uint8Array(N),mag:new Float32Array(N),
         sar:new Int16Array(N),lat:new Float32Array(N),lng:new Float32Array(N),dur:new Uint16Array(N),n:N};
  var j=ECL_EPOCH_JDN, s=ECL_PACKED;
  for(var i=0;i<N;i++){
    var o=i*13;
    j+=u36(s.slice(o,o+2));
    E.jdn[i]=j; E.t[i]=B36.indexOf(s[o+2]); E.mag[i]=u36(s.slice(o+3,o+5))/100;
    E.sar[i]=u36(s.slice(o+5,o+7))-13; E.lat[i]=u36(s.slice(o+7,o+9))/2-90;
    E.lng[i]=u36(s.slice(o+9,o+11))-180; E.dur[i]=u36(s.slice(o+11,o+13))*10;
  }
  ECL=E; return E;
}
var ECL_TYPE_NAMES={A:"annular",T:"total",P:"partial",H:"hybrid"};
function nearestEclipse(jdn){
  var E=eclDecode();
  if(jdn<E.jdn[0]-400||jdn>E.jdn[E.n-1]+400)return null;
  var lo=0,hi=E.n-1;
  while(lo<hi){var mid=(lo+hi)>>1; if(E.jdn[mid]<jdn)lo=mid+1;else hi=mid;}
  var best=lo;
  if(lo>0&&Math.abs(E.jdn[lo-1]-jdn)<Math.abs(E.jdn[lo]-jdn))best=lo-1;
  var tcode=ECL_TYPES[E.t[best]];
  return {jdn:E.jdn[best], diff:E.jdn[best]-jdn,
          type:tcode, typeName:ECL_TYPE_NAMES[tcode[0]]||tcode,
          mag:E.mag[best], saros:E.sar[best], lat:E.lat[best], lng:E.lng[best], dur:E.dur[best]};
}

/* ════════════════════════════════════════════════════════
   BABYLONIAN CALENDAR — Parker & Dubberstein, 626 BCE–75 CE.
   ════════════════════════════════════════════════════════ */
var BAB_MONTHS=["Nisanu","Aiaru","Simanu","Duzu","Abu","Ululu","Tashritu","Arahsamnu","Kislimu","Tebetu","Shabatu","Addaru"];
function babylonianFromJDN(jdn){
  if(!PD_YEARS.length||jdn<PD_YEARS[0][0])return null;
  var lo=0,hi=PD_YEARS.length-1;
  while(lo<hi){var mid=(lo+hi+1)>>1; if(PD_YEARS[mid][0]<=jdn)lo=mid;else hi=mid-1;}
  var Y=PD_YEARS[lo];
  var lens=Y[2], k=Y[1], j=Y[0], mo=0;
  while(mo<k){
    var L=lens[mo]==='1'?30:29;
    if(j+L>jdn)break;
    j+=L; mo++;
  }
  if(mo>=k)return null;  /* past table's last chained year */
  var names, intercal=k===13;
  if(intercal){
    /* month naming for 13-month years: table encodes lengths, not which month
       doubled; label positionally and flag it, per the parse's honest limits */
    names=BAB_MONTHS.slice(0,6).concat(["Intercalary"],BAB_MONTHS.slice(6));
  } else names=BAB_MONTHS;
  var flagged=Y[3]===1 && mo>= (Y[4]?Y[4]-1:6);
  return {month:names[mo], mnum:mo+1, of:k, day:jdn-j+1, intercal:intercal, approx:flagged};
}

      cnyNote=`new year fell ${MN[cny[0]-1]} ${cny[1]}, ${g.y<=0?(1-g.y)+" BCE":g.y} — ${src}`;
    }
    out.push(cell("Chinese sexagenary", chineseSexagenary(cnyYear), cnyNote));
  }
  const je=japaneseEra(gy); if(je) out.push(cell("Japanese nengō", je,"since Meiji — always Gregorian civil year"));
  out.push(cell("Modern frames",
    `HE ${fmt(gy+10000)} · BP ${fmt(1950-gy)} · Anno Lucis ${fmt(gy+4000)} · Minguo/Juche ${gy-1911>0?gy-1911:"—"}`,
    "all four fixed to the modern Gregorian civil year, per their own convention"));
  if(jdn>=2440588) out.push(cell("Unix time (midnight UTC)", fmt((jdn-2440588)*86400)+" s"));
  /* --- computus & astronomy --- */
  if(gy>=1583){
    const we=easterGregorian(gy), oj=jdnToGregorian(easterJulianJDN(gy));
    out.push(cell("Easter of this year",
      `Western ${we.d} ${MN[we.m-1]} · Orthodox ${oj.d} ${MN[oj.m-1]} (civil)`,
      "Butcher / Julian computus"));
  } else if(gy>=325){
    const ej=jdnToJulian(easterJulianJDN(gy));
    out.push(cell("Easter of this year",
      `${ej.d} ${MN[ej.m-1]} (Julian)`,
      "Julian computus — the single rule from Nicaea (325) to the 1582 reform"));
  }
  const ne=nearestEclipse(jdn);
  if(ne){
    const eg2=cal==='j'?jdnToJulian(ne.jdn):jdnToGregorian(ne.jdn);
    const dd=Math.round(ne.diff);
    const when=dd===0?"this very day":(Math.abs(dd)<45?Math.abs(dd)+" d "+(dd>0?"ahead":"before"):Math.round(Math.abs(dd)/30.4)+" mo "+(dd>0?"ahead":"before"));
    out.push(cell("Nearest solar eclipse",
      `${ne.typeName} · ${eg2.d} ${MN[eg2.m-1]} ${eg2.y<=0?(1-eg2.y)+" BCE":eg2.y+" CE"} (${when})`,
      `mag ${ne.mag.toFixed(2)} · saros ${ne.saros} · greatest at ${Math.abs(ne.lat).toFixed(0)}°${ne.lat>=0?"N":"S"} ${Math.abs(ne.lng).toFixed(0)}°${ne.lng>=0?"E":"W"}${ne.dur?` · ${Math.floor(ne.dur/60)}m${String(Math.round(ne.dur%60)).padStart(2,"0")}s central`:""}`));
  }
  const eqG=jdnToGregorian(Math.round(marchEquinoxJD(gy)));
  out.push(cell("Astronomical frame",
    `March equinox ≈ ${eqG.d} ${MN[eqG.m-1]} · ΔT ≈ ${Math.round(deltaT(gy))} s`,
    "mean equinox; ΔT per Espenak–Meeus"));
  /* --- Aztec --- */
  const tz2=tonalpohualli(jdn), yb=aztecYearBearer(gy);
  out.push(cell("Aztec — Tōnalpōhualli", `${tz2.n}-${tz2.sign}`,
    `year bearer ${yb.n}-${yb.sign} (±, year begins spring) · Caso anchor`));
  /* --- Maya deep cycles --- */
  const vp=venusPhase(jdn);
  out.push(cell("Maya deep cycles",
    `Lord of the Night ${lordOfNight(jdn)} · Venus: ${vp.phase} d ${vp.day}/${vp.of}`,
    `moon age ≈ ${moonAgeAtJDN(jdn).toFixed(1)} d · tithi ${trueTithi(jdn)} (true elongation)`));
  { const pc=panchangaExtra(jdn);
    out.push(cell("Pañcāṅga — five limbs", `${pc.nakshatra} · karaṇa ${pc.karana}`,
      `yoga ${pc.yoga} · true-longitude based, same engine as tithi above`)); }
  /* --- Pawukon --- */
  const pw=pawukon(jdn);
  out.push(cell("Balinese Pawukon",
    `day ${pw.day}/210 · wuku ${pw.wuku} · ${pw.sapta} ${pw.panca} ${pw.tri}`,
    pw.tags.length?pw.tags.join(" · "):"no cross-cycle station today"));
  /* --- Tibetan --- */
  const rj=tibetanRabjung(gy);
  if(rj){
    const tr=tibetanReading(jdn,gy);
    out.push(cell("Tibetan — rabjung", `cycle ${rj.cycle}, year ${rj.year}`,
      tr?`month ${tr.m}${tr.leapMonth?" (leap)":""}, day ${tr.d}${tr.doubled?" (doubled)":""} · Phugpa, epoch 1987`
        :"Losar-adjusted ±; element-animal shared with sexagenary"));
  }
  /* --- regional era cluster --- */
  out.push(cell("Regional eras",
    `Spanish ${fmt(hy+38)} · Chula Sakarat ${fmt(hy-638)} · Dangun ${fmt(hy+2333)} · Kurdish ${fmt(hy+700)}`,
    `Nanakshahi ${gy-1468} · Amazigh ${fmt(gy+950)} · Armenian ≈ ${jdn>=1922868?fmt(F((jdn-1922868)/365)+1):"before the count"} — first four on Julian-period basis, last two always Gregorian`));
  /* --- small cycles --- */
  const ice=jdnToGregorian(icelandicSummer(gy));
  out.push(cell("Small cycles",
    `Indiction ${indiction(hm>=9?hy+1:hy)} · ${h.y%7===0?"SHMITA year (AM "+fmt(h.y)+")":"shmita in "+(7-mod(h.y,7))+" Hebrew yrs"}`,
    `Icelandic First Day of Summer: ${ice.d} ${MN[ice.m-1]} · day-ruler: ${["Moon","Mars","Mercury","Jupiter","Venus","Saturn","Sun"][mod(jdn,7)]}`));
  /* --- the deep count: rises only when the asked moment is deep --- */
  deepTablets(jdn,gy,out);
  return out.join("");
}

/* ════════════════════════════════════════════════════════
   THE WHEEL — nested rings of etched signs, cycles in cycles
   ════════════════════════════════════════════════════════ */
var canvas=document.getElementById('wheel-canvas');
var ctx=canvas.getContext('2d');
var W,H,CX,CY,BASE_R,T=0;
var IS_MOBILE = window.innerWidth<=760;
var DPR=Math.min(window.devicePixelRatio||1, IS_MOBILE?1.5:2);

var ETCH=[200,170,118];
var IRIS=[
  [235,215,220],[200,90,85],[140,25,20],[230,170,150],
  [110,140,220],[220,180,90],[180,60,50],[240,230,235]
];
function irisCol(v){
  v=((v%1)+1)%1;
  var f=v*IRIS.length,i=Math.floor(f),fr=f-i;
  var a=IRIS[i%IRIS.length],b=IRIS[(i+1)%IRIS.length];
  return [Math.round(a[0]+(b[0]-a[0])*fr),Math.round(a[1]+(b[1]-a[1])*fr),Math.round(a[2]+(b[2]-a[2])*fr)];
}

var SIGNS=[
  [[-0.6,-0.6,0.6,0.6],[0.6,-0.6,-0.6,0.6],[-0.7,0,0.7,0],[0,-0.7,0,0.7]],
  [[-0.7,-0.35,0.7,-0.35],[-0.7,0,0.7,0],[-0.7,0.35,0.7,0.35],[0.55,-0.35,0.55,0.6]],
  [[-0.7,0,0.7,0],[0,-0.7,0,0.7],[-0.5,-0.5,0.5,0.5],[0.5,-0.5,-0.5,0.5]],
  [[-0.6,-0.4,0.6,-0.4],[-0.6,0,0.6,0],[-0.6,0.4,0.6,0.4],[0.5,-0.4,0.5,0.6]],
  [[0,-0.7,0,0.7],[-0.55,-0.15,0.05,-0.15],[-0.45,0.25,0.05,0.25]],
  [[-0.6,-0.6,-0.6,0.6],[-0.6,0.6,0.6,0.6],[0.1,-0.2,0.1,0.6]],
  [[-0.7,0.3,0,0],[0,-0.65,0,0],[0.7,0.3,0,0],[0,0,0,0.5]],
  [[-0.75,0,0.75,0],[0,0,0,0.65],[-0.4,0.3,0.4,0.3]],
  [[0,-0.6,0.5,0.2],[0.5,0.2,-0.5,0.2],[-0.5,0.2,0,-0.6],[0,0.2,0,0.6]],
  [[-0.6,-0.3,0.6,-0.3],[-0.3,-0.6,-0.3,0.6],[0.3,-0.6,0.3,0.6]],
  [[-0.5,-0.5,0.5,-0.5],[0.5,-0.5,0.5,0.5],[0.5,0.5,-0.5,0.5],[-0.5,0.5,-0.5,-0.5]],
  [[0,-0.7,-0.5,0.3],[0,-0.7,0.5,0.3],[-0.3,0,0.3,0]],
];

function drawEtchedSign(sign,cx,cy,size,alpha,col,rotAng){
  if(alpha<=0.01)return;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rotAng);
  ctx.globalAlpha=alpha;
  ctx.strokeStyle='rgb('+col[0]+','+col[1]+','+col[2]+')';
  ctx.lineWidth=Math.max(0.6,size*0.09);
  ctx.lineCap='round';
  ctx.beginPath();
  for(var i=0;i<sign.length;i++){
    var s=sign[i];
    ctx.moveTo(s[0]*size,s[1]*size);
    ctx.lineTo(s[2]*size,s[3]*size);
  }
  ctx.stroke();
  ctx.fillStyle='rgb('+col[0]+','+col[1]+','+col[2]+')';
  for(var j=0;j<sign.length;j++){
    var s2=sign[j];
    ctx.beginPath();
    ctx.arc(s2[0]*size,s2[1]*size,Math.max(0.7,size*0.10),0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

/* rings: outermost slow like precession, innermost quick like the day */
var RINGS=[
  {r:1.00, count:30, speed:0.00035, dir: 1, size:0.052},
  {r:0.84, count:24, speed:0.00075, dir:-1, size:0.055},
  {r:0.67, count:19, speed:0.00135, dir: 1, size:0.058},
  {r:0.50, count:13, speed:0.00230, dir:-1, size:0.062},
  {r:0.33, count: 8, speed:0.00390, dir: 1, size:0.066},
];
RINGS.forEach(function(ring){
  ring.glyphs=[];
  for(var i=0;i<ring.count;i++){
    ring.glyphs.push({
      base:(i/ring.count)*Math.PI*2,
      sign:Math.floor(Math.random()*SIGNS.length),
      jitter:Math.random()*0.06-0.03
    });
  }
  ring.rot0=Math.random()*Math.PI*2;
});

var pulse=0; /* 0..1, decays; boosts speed + glow on a reading */
function pulseWheel(){ pulse=1; }

var hero=document.getElementById('hero');
function resize(){
  IS_MOBILE = window.innerWidth<=760;
  DPR=Math.min(window.devicePixelRatio||1, IS_MOBILE?1.5:2);
  var rect=hero.getBoundingClientRect();
  W=rect.width; H=rect.height;
  canvas.width=Math.round(W*DPR);
  canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX=W/2; CY=H*0.57;
  BASE_R=Math.min(W*0.44,H*0.40,340);
}
window.addEventListener('resize',resize);

var _frameSkip=0;
function drawWheel(){
  if(IS_MOBILE){                    // halve canvas work on mobile so the background video keeps its frame rate
    _frameSkip++;
    if(_frameSkip%2!==0){ requestAnimationFrame(drawWheel); return; }
  }
  T++;
  if(pulse>0){ pulse*=0.965; if(pulse<0.005)pulse=0; }
  ctx.clearRect(0,0,W,H);

  /* halo behind the wheel */
  var halo=ctx.createRadialGradient(CX,CY,BASE_R*0.1,CX,CY,BASE_R*1.6);
  halo.addColorStop(0,'rgba(125,95,62,'+(0.10+pulse*0.10)+')');
  halo.addColorStop(0.6,'rgba(70,50,32,'+(0.05+pulse*0.05)+')');
  halo.addColorStop(1,'rgba(30,20,12,0)');
  ctx.beginPath();ctx.arc(CX,CY,BASE_R*1.6,0,Math.PI*2);
  ctx.fillStyle=halo;ctx.fill();

  /* dark disc so the center JDN reads clearly */
  var disc=ctx.createRadialGradient(CX,CY,BASE_R*0.02,CX,CY,BASE_R*0.30);
  disc.addColorStop(0,'rgba(8,6,4,0.85)');
  disc.addColorStop(1,'rgba(8,6,4,0)');
  ctx.beginPath();ctx.arc(CX,CY,BASE_R*0.30,0,Math.PI*2);
  ctx.fillStyle=disc;ctx.fill();

  var shimmerAng=T*0.006;

  for(var ri=0;ri<RINGS.length;ri++){
    var ring=RINGS[ri];
    var R=BASE_R*ring.r;

    /* faint guide circle */
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(155,122,80,'+(0.06+pulse*0.06)+')';
    ctx.lineWidth=0.7;ctx.stroke();

    var rot=ring.rot0+T*ring.speed*ring.dir*(1+pulse*1.6);

    for(var gi=0;gi<ring.glyphs.length;gi++){
      var g=ring.glyphs[gi];
      var ang=g.base+rot;
      var x=CX+Math.cos(ang)*R;
      var y=CY+Math.sin(ang)*R;
      var size=BASE_R*ring.size;

      var col=[ETCH[0]+g.jitter*90,ETCH[1]+g.jitter*70,ETCH[2]+g.jitter*55];

      /* iris shimmer sweeps around like on the orb */
      var shimDist=Math.abs(((ang-shimmerAng)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI);
      var shim=Math.max(0,1-shimDist/0.7)*(1+pulse);
      if(shim>0.02){
        var sc=irisCol(ring.r*0.6+T*0.002);
        col=[col[0]+(sc[0]-col[0])*Math.min(1,shim)*0.75,
             col[1]+(sc[1]-col[1])*Math.min(1,shim)*0.75,
             col[2]+(sc[2]-col[2])*Math.min(1,shim)*0.75];
      }
      col=[Math.round(col[0]),Math.round(col[1]),Math.round(col[2])];

      var alpha=(0.45+0.35*Math.sin(g.base*3+T*0.01)+shim*0.2)*(0.85+pulse*0.3);
      alpha=Math.max(0.12,Math.min(1,alpha));

      /* glyph rotated to stand on the ring, like signs carved around a seal */
      drawEtchedSign(SIGNS[g.sign],x,y,size,alpha,col,ang+Math.PI/2);
    }
  }
  requestAnimationFrame(drawWheel);
}

/* touch the wheel: pulse + re-read the current Ask panel date */
canvas.addEventListener('click', function(){ pulseWheel(); runConverter(); });
canvas.addEventListener('touchstart', function(e){ pulseWheel(); runConverter(); },{passive:true});

/* ════════════════════════════════════════════════════════
   WIRING — the asking, the fault lines, the reading
   ════════════════════════════════════════════════════════ */
function moonGlyphSVG(jdn){
  const age=moonAgeAtJDN(jdn), frac=age/SYNODIC;             // 0=new,0.5=full
  const waxing = frac<0.5;
  const k = 1-Math.cos(frac*2*Math.PI);                       // 0 at new/full switch shape, illuminated fraction proxy
  const rx = 16*Math.abs(Math.cos(frac*2*Math.PI));
  const lit = frac<=0.5 ? "right" : "left";
  const litFlag = (frac<0.5)?1:0;
  return `<circle cx="20" cy="20" r="16" fill="#1a1410" stroke="rgba(200,150,90,.35)"/>
    <path d="M20,4 A16,16 0 0,${waxing?1:0} 20,36 A${rx.toFixed(2)},16 0 0,${waxing?0:1} 20,4 Z" fill="#d8bc8c" opacity="0.92"/>`;
}
function drawMoonGlyph(jdn){
  const el=document.getElementById('moonGlyph');
  if(el) el.innerHTML=moonGlyphSVG(jdn);
}

function astroYear(){
  var y=parseFloat(document.getElementById('cy').value);
  var era=document.getElementById('cera').value;
  if(isNaN(y))return NaN;
  if(era==='bp') return 1950-y;      /* the Year field now reads cal BP directly */
  return era==='bce' ? 1-y : y;
}

function currentLocation(){
  var lat=parseFloat(document.getElementById('clat').value);
  var lon=parseFloat(document.getElementById('clon').value);
  if(isNaN(lat)) lat=21.4225; if(isNaN(lon)) lon=39.8262;
  return {lat:lat, lon:lon, label: (lat===21.4225&&lon===39.8262) ? "Mecca (reference site)" : "your coordinates"};
}

function runConverter(){
  clampYearInput();   /* the displayed field must always match what gets read */
  var cal=document.getElementById('ccal').value;
  var era=document.getElementById('cera').value;
  var jdn, resolvedBP=null, sourceC14=null, sourceCurve=null;

  if(cal==='c14sh'||cal==='c14ma'||cal==='c14ic'){
    var c14=parseFloat(document.getElementById('cy').value);
    if(isNaN(c14))return;
    var arr = cal==='c14sh' ? SHCAL20 : cal==='c14ma' ? MARINE20 : INTCAL20;
    var calbp = invertCurve(arr,c14);
    if(calbp===null)return;
    jdn = gregorianToJDN(1950-calbp,1,1);
    resolvedBP=calbp; sourceC14=c14; sourceCurve = cal==='c14sh' ? 'SHCal20' : cal==='c14ma' ? 'Marine20' : 'IntCal20';
  } else if(era==='bp'){
    var bp=parseFloat(document.getElementById('cy').value);
    if(isNaN(bp))return;
    jdn = gregorianToJDN(1950-bp,1,1);
    resolvedBP=bp;
  } else {
    var y=astroYear(),
        m=parseInt(document.getElementById('cm').value,10),
        d=parseInt(document.getElementById('cd').value,10);
    if([y,m,d].some(isNaN))return;
    jdn = cal==='g' ? gregorianToJDN(y,m,d) : julianToJDN(y,m,d);
  }
  var loc=currentLocation();

  var readout=document.getElementById('readout');
  readout.classList.remove('arriving');
  void readout.offsetWidth; /* restart the rise animation */
  if(sourceC14!==null){
    readout.innerHTML=renderDeepReading('c14',jdn,resolvedBP,sourceC14,sourceCurve);
    readout.classList.add('simple');
  } else if(resolvedBP!==null){
    readout.innerHTML=renderDeepReading('bp',jdn,resolvedBP);
    readout.classList.add('simple');
  } else {
    readout.innerHTML=readMoment(jdn,cal,loc);
    readout.classList.remove('simple');
  }
  readout.classList.add('arriving');

  /* center of the wheel shows the asked moment */
  document.getElementById('jdnToday').textContent=fmt(jdn);
  document.getElementById('wdayNow').textContent=weekday(jdn);
  drawMoonGlyph(jdn);
  var g=jdnToGregorian(jdn);
  var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var eraStr=g.y<=0?(1-g.y)+' BCE':g.y+' CE';
  var sub;
  if(sourceC14!==null){
    sub = fmt(resolvedBP)+' cal BP — assayed from '+fmt(sourceC14)+' \u00b9\u2074C BP on '+sourceCurve+' — in every tongue of time';
  } else if(resolvedBP!==null){
    sub = fmt(resolvedBP)+' cal BP ('+eraStr+') — in every tongue of time';
  } else {
    sub = g.d+' '+MN[g.m-1]+' '+eraStr+' — in every tongue of time';
  }
  document.getElementById('reading-sub').textContent = sub;

  if(document.getElementById('compareRow').style.display!=='none') runCompare();
}

function runCompare(){
  var y=document.getElementById('cera2').value==='bce' ? 1-parseInt(document.getElementById('cy2').value,10) : parseInt(document.getElementById('cy2').value,10),
      m=parseInt(document.getElementById('cm2').value,10),
      d=parseInt(document.getElementById('cd2').value,10),
      cal=document.getElementById('ccal2').value;
  if([y,m,d].some(isNaN))return;
  var jdn2 = cal==='g' ? gregorianToJDN(y,m,d) : julianToJDN(y,m,d);
  var readout2=document.getElementById('readout2');
  readout2.innerHTML='<div class="rite-head"><h2>The Second Moment</h2></div>'+readMoment(jdn2,cal,currentLocation());
}

document.getElementById('compareBtn').addEventListener('click',function(){
  var row=document.getElementById('compareRow'), r2=document.getElementById('readout2');
  var showing = row.style.display!=='none';
  row.style.display = showing?'none':'flex';
  r2.style.display = showing?'none':'block';
  this.textContent = showing?'Compare Two Moments':'Hide Comparison';
  if(!showing) runCompare();
});
['cy2','cera2','cm2','cd2','ccal2'].forEach(function(id){
  document.getElementById(id).addEventListener('change', runCompare);
});

function loadFromHash(){
  if(!location.hash) return false;
  var params=new URLSearchParams(location.hash.slice(1));
  if(!params.has('y')) return false;
  var y=parseInt(params.get('y'),10);
  document.getElementById('cy').value = y<=0 ? 1-y : y;
  document.getElementById('cera').value = y<=0 ? 'bce' : 'ce';
  document.getElementById('cm').value=params.get('m')||1;
  document.getElementById('cd').value=params.get('d')||1;
  document.getElementById('ccal').value=params.get('cal')||'g';
  if(params.has('hh')) document.getElementById('chh').value=params.get('hh');
  if(params.has('mm')) document.getElementById('cmm').value=params.get('mm');
  if(params.has('lat')) document.getElementById('clat').value=params.get('lat');
  if(params.has('lon')) document.getElementById('clon').value=params.get('lon');
  return true;
}

function clampYearInput(){
  var cal=document.getElementById('ccal').value;
  var era=document.getElementById('cera').value;
  var cyEl=document.getElementById('cy');
  var noteEl=document.getElementById('askingNote');
  var v=parseFloat(cyEl.value);

  if(cal==='c14sh'||cal==='c14ma'||cal==='c14ic'){
    if(!isNaN(v)&&v<0) cyEl.value=0;
    noteEl.textContent='';
  } else if(era==='bp'){
    noteEl.textContent='';               /* negative BP is valid — a date after 1950 */
  } else {
    if(isNaN(v)||v<1) cyEl.value=1;      /* no year 0 in CE/BCE — force a real year */
    noteEl.textContent='there is no year 0 — 1 BCE is followed directly by 1 CE';
  }
}

function updateAskingUI(){
  var cal=document.getElementById('ccal').value;
  var era=document.getElementById('cera').value;
  var isC14 = cal==='c14sh'||cal==='c14ma'||cal==='c14ic';
  var isBP  = era==='bp';
  var deep  = isC14||isBP;
  var cyEl  = document.getElementById('cy');

  document.getElementById('eraField').style.display = isC14 ? 'none' : '';
  document.getElementById('monthField').style.display = deep ? 'none' : '';
  document.getElementById('dayField').style.display   = deep ? 'none' : '';
  document.getElementById('cyLabel').textContent = isC14
    ? '¹⁴C age BP'
    : (isBP ? 'cal BP' : 'Year');

  if(isC14) cyEl.min='0';
  else if(isBP) cyEl.removeAttribute('min');
  else cyEl.min='1';

  clampYearInput();
}
document.getElementById('ccal').addEventListener('change',updateAskingUI);
document.getElementById('cera').addEventListener('change',updateAskingUI);
document.getElementById('cy').addEventListener('change',clampYearInput);
updateAskingUI();

function setDate(y,m,d,cal){
  var cyEl=document.getElementById('cy'),ceraEl=document.getElementById('cera');
  if(y<=0){ cyEl.value=1-y; ceraEl.value='bce'; }
  else{ cyEl.value=y; ceraEl.value='ce'; }
  document.getElementById('cm').value=m;
  document.getElementById('cd').value=d;
  document.getElementById('ccal').value=cal||'g';
  updateAskingUI();
  pulseWheel();
  runConverter();
}

document.getElementById('convertBtn').addEventListener('click',function(){
  pulseWheel(); runConverter();
});
document.getElementById('nowBtn').addEventListener('click',function(){
  var now=new Date();
  setDate(now.getUTCFullYear(),now.getUTCMonth()+1,now.getUTCDate(),'g');
});

/* enter on any input reads the moment */
['cy','cm','cd'].forEach(function(id){
  document.getElementById(id).addEventListener('keydown',function(e){
    if(e.key==='Enter'){ pulseWheel(); runConverter(); }
  });
});

var LORE={
"Drowned lands":{
 tag:"The shore is the least permanent line on any map. Two reconstructed coastlines, from real seafloor depths and a real sea-level history — and, for the Black Sea, two coastlines at once, because the sources disagree.",
 body:["<em>The record:</em> depths are GEBCO bathymetry, block-averaged; the sea-level curve is built knot by knot from the stated values of Lambeck et al. 2014 (PNAS 111:15296) — lowest stand −134 m at 21,000 cal BP, Meltwater Pulse 1A at 14.5–14.0 ka, the Younger Dryas pause, near-modern by 2,500 BP. Water is flood-filled from the open ocean, so a basin below sea level floods only if the sea can actually reach it.",
 "<em>The Persian Gulf:</em> at the glacial lowstand the entire Gulf floor is dry land — the Tigris–Euphrates ran down a river valley to a shore near the Strait of Hormuz. The sea came back up the valley through the very millennia in which the Ubaid settlements, Eridu first among them, appear at the head of the Gulf. The amber cells are that lost plain.",
 "<em>The Black Sea:</em> before ~9,400 cal BP (Giosan et al. 2009) it was a lake, cut off at the Bosporus. Ryan & Pitman's 1997 hypothesis put the lake at −80 m — reconnection then drowns ~70,000 km² in a rush. The newer evidence puts it at −30 m — flooding only ~2,000 km². The toggle holds both; this codex does not adjudicate.",
 "<em>What is not applied:</em> glacial-isostatic adjustment. On shelves it can reach 15–20% of the sea-level signal at lowstand (Lambeck et al. 2011); the model that would supply it, ICE-6G_C (VM5a) (Argus et al. 2014, GJI 198:537), is cited here but its output grids are not aboard — so no correction is faked. Doggerland and Sundaland await usable grids: the Doggerland file never reached Dogger Bank (grid tops at 52.08°N) and the Sundaland download truncated at 14°S."]},
"Sogdian (Transoxanian)":{
 tag:"The calendar of the Magians of Transoxiana — Khwarizm and Sughd — as al-Bīrūnī himself recorded it around 1000 CE, anchored five days after the Persian New Year.",
 body:["Al-Bīrūnī, Chronology of Ancient Nations (tr. Sachau, p. 46): the Transoxanians 'append the five Epagomenae to the end of their year, and commence the year with the 6th day of the Persian month Farwardin.' Twelve months of thirty days, then the five added days — the same skeleton as the Persian and Egyptian wandering years, one of the great family of 365-day calendars that refuse to leap.",
 "Because neither the Sogdian nor the Persian year ever intercalates, their five-day offset is constant for all time — so the whole calendar hangs from one nail: the Yazdegerdi epoch, 16 June 632 CE Julian, JDN 1,952,063. Ginzel states that day number outright, and cross-checks it through al-Bīrūnī's own intervals: Seleucid epoch + 344,324 days = Yazdegerdi epoch, and + 340,700 = Hijra — both chains land on the same Seleucid day, JDN 1,607,739.",
 "Month I is Nausard — the name survives legibly in Sachau's transliteration; the remaining eleven are garbled in the OCR of this copy and are shown by number rather than invented. And one caveat stays lit: al-Bīrūnī describes the calendar of his own era. Whether the same alignment held in the pre-Islamic centuries of the Mount Mugh documents is the question de Blois's work addresses — flagged here, not silently assumed."]},
"Babylonian (attested)":{
 tag:"Not computed — attested. Parker & Dubberstein's tables restate 700 years of Babylonian dates in Julian terms, month by month, from cuneiform sources and Schoch's new-moon tables.",
 body:["Each month began when the crescent was first sighted at Babylon; a thirteenth month — a second Ululu or a second Addaru — was intercalated to hold Nisanu 1 near spring, empirically at first, then locked to the 19-year cycle. This tablet reads from their printed tables (626 BCE–75 CE), chain-validated month by month against each following year's New Year.",
 "The verification: 12 October 539 BCE — the day Babylon fell to Cyrus — resolves through these tables to day 16 of month seven, Tashritu. The Nabonidus Chronicle records the city taken on 16 Tashritu. Table and tablet agree across twenty-five centuries.",
 "P&D themselves warn that any date may sit one day off, since Schoch's crescent-visibility tables carry their own uncertainty — and dates marked ±1 d here fall in the reconstructed tail of a printed row, where this codex refuses to claim more precision than the page gives."]},
"Egyptian civil (wandering)":{
 tag:"The most stubborn calendar ever kept: 365 days, every year, forever — no leap day, so it walked backward through the seasons once every 1,460 years.",
 body:["Three seasons of four thirty-day months — Akhet the inundation, Peret the emergence, Shemu the harvest — then five days 'upon the year' (Parker, SAOC 26). Because it never intercalated, New Year's Day drifted through the entire solar year and back: the Sothic cycle.",
 "The count shown is the era of Nabonassar, from Thoth 1 = 26 February 747 BCE — the epoch Ptolemy used for every observation in the Almagest, which is why this wandering year, of all calendars, carried ancient astronomy (Ginzel II). Its skeleton survives in the Coptic tablet, frozen later by the Alexandrian reform."]},
"Nearest solar eclipse":{
 tag:"11,898 eclipses over five thousand years — the Five Millennium Canon of Espenak & Meeus, carried whole inside this page.",
 body:["Every solar eclipse from 2000 BCE to 3000 CE, each with its type, magnitude, Saros series, and the point on Earth where the eclipse was greatest, computed from modern lunar and solar theory with ΔT corrections for the slowing of Earth's rotation.",
 "The check against history: the eclipse of 28 May 585 BCE — which Herodotus says Thales foretold, and which stopped a battle between Lydians and Medes — resolves in this data to the exact day: total, saros 57, magnitude 1.08.",
 "The Saros number names the eclipse's family: eclipses 6,585.3 days apart repeat with similar geometry — a rhythm the Babylonians of the tablet above already knew."]},
"Babylonian (schematic)":{
 tag:"The month begins when the crescent is first seen over Babylon; the year is anchored to Nisanu and the akitu festival.",
 body:["Parker & Dubberstein's tables fix every Babylonian month-start from 626 BCE to 75 CE. After ~380 BCE intercalation locked to the 19-year cycle — seven leap months in nineteen — the same machine the fixed Hebrew calendar inherited, which is why this page can rename Hebrew months (Nisan → Nisanu, Tishri → Tashritu) and land within a day of the cuneiform record.",
 "The Seleucid year shown is history's first continuous, ruler-independent era — the count that never reset, ancestor of every running 'year N.'"]},
"Julian Day Number":{
 tag:"Devised by Joseph Justus Scaliger, 1583 — a strict count of days. No weeks, no months, no theology.",
 body:["Day zero fell at noon on 1 January 4713 BCE in the proleptic Julian calendar — chosen because three great cycles (the 28-year solar, the 19-year lunar, and the 15-year indiction) all begin together there, a coincidence that recurs only every 7,980 years.",
 "It is the clearing house of the Kronosphere: every conversion on this page passes through the JDN. Astronomers still use it for the same reason Scaliger built it — a number that no reform, no empire, and no church can move."]},
"Gregorian (proleptic)":{
 tag:"A 16th-century precision-patch on Caesar's calendar, centered on the Incarnation, exported globally through empire and now enforced by interoperability itself.",
 body:["Pope Gregory XIII's commission (Aloysius Lilius, Christopher Clavius) cut ten days from October 1582 and thinned the leap years — three fewer every 400 years — to stop Easter drifting away from spring.",
 "\u201CProleptic\u201D means the calendar is extended backward before its own birth: a date like 21 December 2012 CE is native, but 3114 BCE Gregorian is a projection onto centuries that never knew it."]},
"Julian calendar":{
 tag:"Caesar's year of 365¼ days — eleven minutes too long, and eleven minutes was enough to move the seasons.",
 body:["Instituted 45 BCE with the counsel of Sosigenes of Alexandria, it ran the Mediterranean world for over sixteen centuries. The drift — about one day every 128 years — is why the Gregorian reform exists.",
 "It never died. Orthodox liturgy still computes by it, which is why Orthodox Easter and Christmas fall where they do — the \u201COld Style\u201D shown here."]},
"Hebrew — Anno Mundi":{
 tag:"Counts from a calculated creation; the year is a lunisolar negotiation between moon and sun, fixed by Hillel II's rules (traditional attribution, 4th c. CE).",
 body:["The epoch is 3761 BCE — not observed but computed backward through the genealogies of Genesis. Months follow the moon; seven leap-months in every nineteen years keep Passover in spring.",
 "The day begins at the prior sunset, which is why every value here carries that warning. Six fixed rules (deḥiyyot) nudge New Year to permitted weekdays — arithmetic in service of liturgy."]},
"Islamic — Hijri (tabular)":{
 tag:"A purely lunar year of ~354 days that deliberately refuses the solar cycle — months migrate through all seasons, detaching sacred time from agricultural time.",
 body:["The count opens at the Hijra — the Prophet's migration from Mecca to Medina, 622 CE. Ramadan therefore wanders: through summer, through winter, completing the circle of seasons every 33 years.",
 "The tabular calendar shown is arithmetic; religious practice follows the sighted crescent, which is why observation may differ by a day or two from the number on this tablet.",
 "The tabular calendar uses the 30-year cycle of 11 leap years (Burnaby's exposition). The observational calendar waits instead for the first evening crescent \u2014 and Yallop's q-test (HMNAO TN 69, calibrated on 295 sightings, 1859\u20131996) is the modern criterion for whether that hair-thin moon can be seen at all.",
 "Near new moon, a further tablet computes Yallop's q-test directly \u2014 real sun and moon geometry from the reference site, not just the ±1\u20132 day flag. The Moon's position now runs on Meeus's full ~120-term ELP2000-derived series (Ch. 45), transcribed from the primary source and checked against his own worked example to within a few arcseconds; the Sun uses his equation-of-center method, matching his printed coefficients exactly. Checked against three real sightings in Yallop's own dataset: azimuth separation matched almost exactly, altitude within a few degrees, the visibility band landing correctly or one band adjacent. What remains low-precision is the sunset/moonset solver itself, not the underlying positions."]},
"Solar Hijri":{
 tag:"The same Hijra epoch as Islam's lunar count, but measured in solar years from the vernal equinox — the most astronomically exact civil calendar in official use.",
 body:["The year begins at Nowruz, the instant of the March equinox as observed from the meridian of Tehran — a Zoroastrian new year carried into the Islamic era.",
 "Its 33-year leap pattern tracks the true solar year more closely than the Gregorian rule does. Iran and Afghanistan keep civil time by it."]},
"Mayan Long Count":{
 tag:"Three interlocking gears: a linear day-count from creation, a 260-day sacred round, and a 365-day vague year — meshing once every 52 years.",
 body:["The Long Count opens at 4 Ajaw 8 Kumk'u — 11 August 3114 BCE by the GMT 584,283 correlation — and climbs in place values: k'in (day), winal (20), tun (360), k'atun (7,200), b'ak'tun (144,000).",
 "13.0.0.0.0 completed on 21 December 2012 — not an ending but an odometer turning, as inscriptions at Palenque already project dates thousands of years beyond it.",
 "The Popol Vuh opens where the Long Count opens: sky and sea alone, and the gods asking how dawn shall be made. Humanity is attempted in mud, then wood, then finally maize \u2014 prior creations destroyed and superseded, exactly the logic of a calendar whose epoch is the fourth creation. The count and the myth are one architecture.",
 "The correlation used here (Thompson/GMT, 584,283) is contested, not settled: Lounsbury and Schele/Freidel support 584,285 instead \u2014 two days later \u2014 and both are in real, serious use. Confirmation from software itself: Dershowitz and Reingold\u2019s own reference implementation (the field\u2019s standard textbook code) is built on 584,285, not the value used as this page\u2019s default. The engine\u2019s mayaLC() exposes the correlation as a parameter for exactly this reason.",
 "The 584,283 correlation (Thompson) is used here because it matches the tzolk\u2019in count still kept in the Guatemalan highlands — the strongest living evidence; Lounsbury\u2019s 584,285 alternative would shift every date on this tablet by two days, a dispute the sources hold open."]},
"Kali era":{
 tag:"The largest time-architecture any civilization built: nested cycles from the 24-hour day to the 311-trillion-year life of Brahmā.",
 body:["Kali Yuga opens at Krishna's departure — midnight, 17/18 February 3102 BCE — the last and darkest of four descending ages totaling 4,320,000 years. We stand barely one percent into its 432,000.",
 "The ahargana shown is the raw heap of days since that midnight — the same instinct as the Julian Day Number, reached two thousand years earlier.",
 "\u0100ryabha\u1e6da pins the era to absolute time: in the \u0100ryabha\u1e6d\u012bya he writes that he was twenty-three when 3,600 years of the yuga had passed \u2014 Kali 3600 = 499 CE, exactly. One sentence from fifteen centuries ago, and the whole count locks to the JDN spine. His mah\u0101yuga of 4,320,000 years is the arithmetic behind the ahargana day-count shown here (Āryabhaṭīya, tr. Clark 1930)."]},
"Coptic — Era of Martyrs":{
 tag:"A church that counts its years from the reign of its persecutor.",
 body:["Anno Martyrum begins at the accession of Diocletian, 284 CE, whose persecution shaped the Egyptian church's memory of itself. The structure beneath is pharaonic: twelve months of thirty days and five (or six) days \u201Cupon the year.\u201D",
 "It remains the liturgical calendar of the Coptic Orthodox Church — the civil calendar of ancient Egypt, still running."]},
"Ethiopian":{
 tag:"The Era of Mercy — Amätä Məhrät — same Alexandrian machinery, a different Incarnation.",
 body:["Ethiopia follows the Annunciation reckoning of Annianus of Alexandria, placing the Incarnation seven to eight years later than Rome's Dionysius did — which is why Ethiopia's millennium arrived in September 2007.",
 "Thirteen months: twelve of thirty days, and Ṗagume, the small thirteenth. The year turns on 11 September (12 after a leap year)."]},
"French Republican":{
 tag:"Attempts to reset the count by decree — proof that every calendar is a claim of sovereignty.",
 body:["An I opens on 22 September 1792: the autumn equinox and the proclamation of the Republic on the same day, nature and politics fused by design. Months were named for weather — Nivôse, snow; Thermidor, heat — and weeks made decimal.",
 "Napoleon abolished it at the end of 1805. Values after that are extrapolated by Romme's leap rule — a ghost calendar, run forward for the curious."]},
"Byzantine AM":{
 tag:"Creation at 1 September 5509 BCE — the official time of an empire for a thousand years, and of Russia after it.",
 body:["Constantinople dated law, chronicle, and liturgy from this creation. The civil year turns on 1 September — the indiction's new year — so this tablet resolves to whichever side of that turnover the asked date falls on.",
 "Russia kept it until Peter the Great abolished it on what would have been 1 January AM 7208, decreeing 1700 in its place."]},
"Era clusters":{
 tag:"Simple offsets, each carrying a nation's chosen zero.",
 body:["AUC counts from the founding of Rome, 753 BCE. Śaka (78 CE) anchors India's national calendar; Vikram (57 BCE) is its northern elder.",
 "The Seleucid Era (312 BCE) deserves its own tablet: the first era in history to simply keep counting, ruler after ruler, rather than restarting with each king. The idea of a continuous era — the idea this whole page depends on — was invented once, there.",
 "Al-B\u012br\u016bn\u012b\u2019s Chronology of Ancient Nations (c. 1000 CE) already treats these eras comparatively — counting years \u2018till Alexander\u2019 across Persian, Jewish, and Greek reckonings — the first book to do what this page does."]},
"Buddhist / Bahá'í / Yazdegerdi":{
 tag:"Three counts from three departures — a parinirvāṇa, a declaration, a fallen throne.",
 body:["The Buddhist Era counts from the Buddha's parinirvāṇa in the Theravāda reckoning of 543 BCE; Thailand, Cambodia, Laos, Myanmar, and Sri Lanka keep civil or religious time by it.",
 "The Bahá'í Badí' calendar opens at the Báb's declaration in 1844, structured nineteen by nineteen. The Yazdegerdi era counts from the coronation of Yazdegerd III in 632 CE — the last Sasanian king — kept alive by Zoroastrians after the throne itself was gone."]},
"Chinese sexagenary":{
 tag:"Not an era but a texture: every year, month, day, and double-hour carries one of 60 stem-branch signatures, repeating like a woven pattern beneath dynastic names.",
 body:["Ten heavenly stems cross twelve earthly branches; the cycle of sixty is attested on Shang oracle bones for days before it was ever used for years — the oldest continuously running count in the world.",
 "China historically named years by reign and textured them by cycle: an emperor above, the sixty-fold weave beneath. The weave outlasted every dynasty.",
 "The month rules (per Aslaksen): each month begins at astronomical new moon computed for 120\u00b0E; the winter solstice must fall in month 11; a thirteen-moon year repeats the first month containing no zh\u014dngq\u00ec. Pure astronomy, no arithmetic cycle \u2014 Chinese New Year cannot be projected by formula, only computed.",
 "The sign turns not on 1 January but on the lunar New Year. For 2024–2035 the turnover comes from the observed table; for other years it is computed from the true new moon in Chinese civil time (Meeus\u2019 lunar theory), verified against all twelve table years — including 2034, the notorious edge case. The full calendar\u2019s deeper rules — the winter-solstice month and the zh\u014dngq\u00ec placement of leap months — are as Aslaksen sets them out."]},
"Japanese nengō":{
 tag:"Time as sovereignty: the era is the emperor.",
 body:["Era names once changed for omens, disasters, and auspicious turtles; since Meiji (1868), one era per reign. Heisei 24 on this tablet is 2012 by another throne's name.",
 "Reiwa — \u201Cbeautiful harmony\u201D — began in 2019, the first era name drawn from Japanese rather than Chinese classics. Official documents in Japan still carry these years."]},
"Modern frames":{
 tag:"Re-zeroings for a species that learned how old it actually is.",
 body:["The Holocene Era simply adds 10,000 — Cesare Emiliani's proposal to start counting at the birth of settled civilization, turning 2012 into HE 12,012 and making all recorded history positive.",
 "BP — Before Present — is frozen to 1950, the eve of bomb-carbon contamination, which is why a date after 1950 shows as negative. Anno Lucis adds 4,000 (Masonic \u201Cyear of light\u201D); Minguo and Juche both count from 1912, republic and dynasty of a different kind."]},
"Unix time (midnight UTC)":{
 tag:"Engineering convenience become epoch.",
 body:["Seconds since midnight UTC, 1 January 1970 — chosen for no cosmic reason at all, just a round number near the birth of Unix. It now timestamps most of the machinery of the world.",
 "Signed 32-bit counters overflow on 19 January 2038 — a fault line already listed above, the first eschatology ever scheduled by integer width."]},
"Easter of this year":{
 tag:"The computus: the calculation that drove a thousand years of astronomy.",
 body:["Easter is the first Sunday after the first ecclesiastical full moon on or after 21 March — a rule that forced the church to model sun and moon together, centuries before it had any other reason to.",
 "The West computes by the Gregorian calendar (Butcher's algorithm here); Orthodoxy by the Julian — which is why two dates share this tablet, usually apart, occasionally coinciding."]},
"Astronomical frame":{
 tag:"The planet itself is not a stable clock.",
 body:["The March equinox is the year's physical hinge — the moment the calendars are all, in their own ways, trying to hold still.",
 "ΔT is the accumulating gap between atomic time and the Earth's actual rotation, which slows irregularly (Espenak–Meeus). For ancient dates it reaches hours: the deep past did not tick at our rate."]},
"Aztec — Tōnalpōhualli":{
 tag:"Fifty-two years of borrowed time at a stretch: at each xiuhmolpilli the fires were extinguished, and the empire watched the Pleiades to learn whether time would be renewed at all.",
 body:["The tōnalpōhualli pairs thirteen numbers with twenty day-signs — a 260-day sacred round governing fate and naming. The 365-day xiuhpōhualli runs beside it; together they mesh once in 52 years.",
 "At that meeting, the New Fire ceremony: every flame in the valley put out, priests on the Hill of the Star waiting for the Pleiades to cross the zenith — proof the sky consented to continue. Then fire, carried torch by torch, to every hearth."]},
"Maya deep cycles":{
 tag:"Beyond Long Count, Tzolk'in, and Haab, the inscriptions carry further concurrent counts — a nine-day night-watch, the moon's age, and Venus.",
 body:["The Lords of the Night, G1 through G9, cycle beneath every date — a nine-day watch whose meaning is mostly lost but whose arithmetic survives intact on the monuments.",
 "The Dresden Codex tracks Venus through its canonical 584-day round — morning star, vanishing, evening star, vanishing — timed to warfare and augury. The moon's age rode in the inscriptions' Lunar Series beside it."]},
"Balinese Pawukon":{
 tag:"Ten weeks of ten different lengths running at once, inside a 210-day cycle that counts nothing, accumulates nothing, and dates nothing — pure recurrence.",
 body:["Weeks of one, two, three… up to ten days, all running concurrently; a day is named by where it stands in each. The triwara, pancawara, and saptawara shown here are the three most consulted.",
 "There is no year number and no epoch — nothing to convert to. The Pawukon answers a different question than \u201Cwhen\u201D: it answers what kind of day this is, and which temple's anniversary it carries."]},
"Tibetan — rabjung":{
 tag:"The only major calendar in which days of the month are skipped or doubled — because the day-number belongs to the moon's motion, not the sun's.",
 body:["Sixty-year cycles counted from 1027 CE, the year the Kālacakra Tantra — the Wheel of Time teaching — is held to have arrived in Tibet. Years carry element-animal pairs shared with the Chinese weave.",
 "Dates are set by lunar longitude: when the moon moves fast a day-number vanishes; when slow, one repeats. Losar, the new year, floats accordingly.",
 "Janson's Tibetan Calendar Mathematics gives the full machinery: days are numbered by the lunar day in force at dawn, so dates skip and double by design; intercalation rides the ratio 67 lunar months \u2248 65 solar months. The stuttering date-line is not error \u2014 it is the moon written directly into the page of the month.",
 "The month and day shown are now computed by the full Phugpa algorithm \u2014 mean and true motions of sun and moon, the 67-lunar-months-in-65-solar-months leap rule \u2014 rather than just the 60-year cycle name. Checked against Janson's own 108-year table of Losar dates: 102 exact matches, the rest off by exactly one day, a rounding choice Janson documents in his own paper."]},
"Regional eras":{
 tag:"Each offset a founding: a census, a coronation, a myth, a migration.",
 body:["The Spanish Era (38 BCE) dated Iberian charters into the late Middle Ages. Chula Sakarat (638 CE) ran Southeast Asian courts. Dangun counts from Korea's mythic founding, 2333 BCE; the Kurdish era from the Median conquest of Nineveh.",
 "Nanakshahi counts from Guru Nanak's birth (1469); the Amazigh calendar from Shoshenq's accession to Egypt's throne — a Berber pharaoh, 950 BCE; the Armenian Great Era from a calendrical council of 552 CE.",
 "Ginzel's Handbuch (vol. III) stands behind this cell \u2014 Armenian, Byzantine, medieval and modern reckonings with the era arithmetic verified. The Armenian year shown is the classical 365-day drifting year from 552 CE; Ginzel also documents the later fixed (Azariah) reform, left aside here."]},
"Deep count":{
 tag:"Two frozen presents: 1950, the eve of bomb-carbon, anchors 'BP'; 2000 anchors the ice cores' 'b2k'. Fifty years apart, easily confused, never interchangeable.",
 body:["BP is not 'years ago.' It is years before 1950 CE — frozen there because atmospheric nuclear testing salted the air with radiocarbon and ended the natural baseline. The ice-core community counts from 2000 CE instead (b2k), so the ratified Holocene boundaries are published in b2k and must be shifted by fifty years to compare.",
 "Beneath both sits a harder question: what a number this deep can mean. Eliade held that myth does not report a dated past but re-actualises an origin outside chronology. Assmann showed that living memory reaches back some eighty years; beyond that, only cultural memory — canonised, ritualised, loyal to meaning rather than measurement. And Vansina, who proved oral tradition can carry real history, also measured its horizon: a few centuries, after which chronology dissolves into a floating time of origin. The deep count is real, and it is also a kind of time no memory ever kept."]},
"Holocene stage":{
 tag:"Three ages, ratified in 2018 — each boundary a physical point in a physical archive: two Greenland ice cores and one Indian cave stone.",
 body:["The Greenlandian begins at the Holocene's base, 11,700 yr b2k in the NGRIP2 core — the abrupt end of the Younger Dryas cold. The Northgrippian begins at 8236 yr b2k in NGRIP1, the sharp cooling called the 8.2 ka event. The Meghalayan begins ~4200 yr BP, fixed in a speleothem from Mawmluh Cave, Meghalaya — the aridification called the 4.2 ka event (Walker et al. 2018).",
 "A GSSP — a 'golden spike' — is not a date but a place: a marked level in a core or a cave from which the age is measured. The stage named on this tablet is where the asked moment falls between those spikes."]},
"Radiocarbon assay":{
 tag:"The curve run in its honest direction: not 'when is this sample from,' but 'what would a sample from this year measure.'",
 body:["A radiocarbon age is not a calendar age — the atmosphere's ¹⁴C has wandered, so the two scales flex against each other. Calibration curves (Stuiver & Polach set the conventions; SHCal20 and Marine20 are the current Southern-Hemisphere and ocean curves) tabulate the relationship, and this tablet reads it forward for the asked year.",
 "Three values appear because there are three reservoirs: the northern atmosphere (IntCal20 — the reference curve, built from tree rings, speleothems, corals; Reimer et al. 2020), the southern atmosphere (SHCal20, reading ~30\u201340 years older through most of the Holocene), and the surface ocean (Marine20, centuries 'old' because deep water is slow to exchange its carbon). The hemispheres cross near 1950 itself — even the offset is not constant."]},
"Small cycles":{
 tag:"Rounds smaller than the year, older than the states that used them.",
 body:["The indiction — a fifteen-year Roman tax round — outlived the empire by a millennium in the dating clauses of charters. The shmita gives the land itself a sabbath, one year in seven.",
 "Iceland still marks the First Day of Summer, a Thursday in late April, from the old misseri reckoning of two seasons. And the day-ruler shown is the planetary week — the most durable astrological artifact in the world, hiding in the names of your weekdays."]}
};

      "For Popol Vuh and Atrahasis, the flood is not an event that occurred once. It is the recurring moment at which the gods remake their compact with humanity — always present, always available for re-actualization. The question is not 'when did it happen?' but 'how does it still happen?' Each catastrophe re-enacts the mythic flood.",

    body: [

      "The Babylonian and Popol Vuh flood accounts are mythic in Assmann's sense: they persist across a thousand years with extraordinary stability, embedded in ritual and re-told at moments of crisis. The historical floods — Black Sea transgression, monsoon failures — vanish into the paleoclimate record within four generations.",
      "What GEBCO maps show (drowned lands, coastlines 80 m below modern) is the paleoclimate record. What myths hold is the meaning-structure: the knowledge that the world can be unmade and remade, that the gods enforce the boundary, and that a new bargain begins on the other side."
    ]

      "Vansina's insight: we cannot treat such narratives as eyewitness accounts, even if they have deep roots in real events. Instead, recognize them as the memory-form that keeps a pattern stable: catastrophe as divine reset, boundary between epochs, covenant struck or renewed. The pattern survives; the details do not."

function openLore(sys,val){

  document.getElementById('lore-tag').textContent=L.tag;
  var bodyHtml=L.body.map(function(p){return '<p>'+p+'</p>';}).join('');
  if(sys==="Drowned lands")bodyHtml=paleoUI()+bodyHtml;
  document.getElementById('lore-body').innerHTML=bodyHtml;
  loreVeil.classList.add('open');
  if(sys==="Drowned lands"){
    drawPaleo();

      if(!b)return;

      drawPaleo();
    });
  }
}

/* ── Drowned-lands map ── */
var PALEO_DEC={};
function paleoGrid(key){
  if(PALEO_DEC[key])return PALEO_DEC[key];
  var R=PALEO_REGIONS[key],B="0123456789abcdefghijklmnopqrstuvwxyz";
  var n=R.w*R.h,a=new Int16Array(n);
  for(var i=0;i<n;i++)a[i]=B.indexOf(R.cell[i*2])*36+B.indexOf(R.cell[i*2+1])-300;
  PALEO_DEC[key]=a; return a;
}
function paleoFill(key,elev,levels,seeds){
  /* BFS flood from ocean/lake seeds; a cell floods only if reachable */
  var R=PALEO_REGIONS[key],w=R.w,h=R.h;
  var water=new Int8Array(w*h); /* 0 dry, 1 ocean, 2 lake */
  var q=[];
  for(var s=0;s<seeds.length;s++){
    var lat=seeds[s][0],lon=seeds[s][1],tag=seeds[s][2],lv=levels[tag-1];
    var x=Math.round((lon-R.lon0)/(R.lon1-R.lon0)*(w-1));
    var y=Math.round((lat-R.lat0)/(R.lat1-R.lat0)*(h-1));
    var i=y*w+x;
    if(elev[i]<=lv&&!water[i]){water[i]=tag;q.push(i);}
  }
  while(q.length){
    var i=q.pop(),tag=water[i],lv=levels[tag-1];
    var x=i%w,y=(i-x)/w;
    var nb=[i-1,i+1,i-w,i+w];
    for(var k=0;k<4;k++){
      var j=nb[k];
      if(j<0||j>=w*h)continue;
      if(k<2&&((i%w===0&&k===0)||(i%w===w-1&&k===1)))continue;
      if(!water[j]&&elev[j]<=lv){water[j]=tag;q.push(j);}
    }
  }
  return water;
}
var PALEO_STATE={region:"gulf",hyp:"giosan"};
function drawPaleo(){
  var key=PALEO_STATE.region,R=PALEO_REGIONS[key];
  var calbp=window.PALEO_BP||0;
  var esl=eslAt(calbp);
  var levels,seeds,capt;
  if(key==="bsea"&&calbp>BSEA_RECONNECT_BP){
    var lake=BSEA_LEVELS[PALEO_STATE.hyp];
    levels=[esl,lake];
    seeds=[[40.6,28.6,1],[43.0,34.0,2]];  /* Marmara = ocean, Black Sea basin = lake */
    capt="a lake, cut off at the Bosporus — "+(PALEO_STATE.hyp==="ryan"?"Ryan & Pitman: −80 m":"Giosan / newer evidence: −30 m")+" · world ocean at "+Math.round(esl)+" m";
  } else if(key==="bsea"){
    levels=[esl]; seeds=[[40.6,28.6,1],[43.0,34.0,1]];
    capt="reconnected to the world ocean · sea at "+Math.round(esl)+" m";
  } else {
    levels=[esl]; seeds=[[24.7,57.2,1]];  /* Gulf of Oman */
    capt="sea at "+Math.round(esl)+" m relative to today";
  }
  var elev=paleoGrid(key);
  var water=paleoFill(key,elev,levels,seeds);
  var cv=document.getElementById('paleo-canvas');
  cv.width=R.w;cv.height=R.h;
  var ctx=cv.getContext('2d'),img=ctx.createImageData(R.w,R.h),d=img.data;
  for(var i=0;i<R.w*R.h;i++){
    var e=elev[i],o=i*4,wt=water[i];
    if(wt){ /* water then */
      var lv=levels[wt-1],dep=Math.min(1,(lv-e)/120);
      d[o]=8+10*(1-dep);d[o+1]=30+40*(1-dep);d[o+2]=70+90*(1-dep);d[o+3]=255;
    } else if(e<0){ /* land then, sea today: the drowned land */
      d[o]=214;d[o+1]=170;d[o+2]=96;d[o+3]=255;
    } else { /* land then and now */
      var hh=Math.min(1,e/500);
      d[o]=52+40*hh;d[o+1]=48+30*hh;d[o+2]=44+20*hh;d[o+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
  document.getElementById('paleo-caption').textContent=
    R.name+" · "+fmt(Math.round(calbp))+" cal BP · "+capt+" · amber = land then, seafloor now";
  document.getElementById('paleo-hyp').style.display=(key==="bsea"&&calbp>BSEA_RECONNECT_BP)?"inline-block":"none";
}

    var FADE=1.0;           // seconds of fade in each direction
    var fading=false;
    vid.addEventListener('timeupdate',function(){
      if(!fading && vid.duration && (vid.duration-vid.currentTime)<=FADE){
        fading=true;
        vid.style.opacity='0';

    vid.addEventListener('ended',function(){
      vid.currentTime=0;
      vid.play();

    });
  }
})();
